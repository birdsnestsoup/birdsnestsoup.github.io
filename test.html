<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch Lý Huyền Cơ - Full Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; --bg: #121212; --card: #1e1e1e; 
            --text: #e0e0e0; --primary: #c0392b; --accent: #27ae60; --border: #333;
        }
        body { 
            font-family: 'Lexend', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; 
        }
        .container { width: 100%; max-width: 650px; }
        .header { text-align: center; padding: 15px 0; border-bottom: 2px solid var(--gold); margin-bottom: 20px; }
        .header h1 { color: var(--gold); font-size: 1.4rem; margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        .box { background: var(--card); border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; border: 1px solid var(--border); }
        label { font-size: 0.7rem; font-weight: 600; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; display: block; opacity: 0.8; }
        select { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; 
            background: #252525; color: white; font-family: inherit; font-size: 1rem; margin-bottom: 15px; outline: none;
        }
        .dong-selector { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 10px; }
        .dong-item { flex: 1; text-align: center; cursor: pointer; transition: 0.2s; padding: 10px 0; border-radius: 8px; background: #252525; border: 1px solid #444; }
        .dong-item.active { background: var(--primary); border-color: var(--gold); }
        .dong-item span { font-size: 0.65rem; font-weight: bold; color: #bbb; }
        .dong-item.active span { color: white; }
        .btn-copy { 
            width: 100%; padding: 15px; background: var(--gold); color: #000; border: none; 
            border-radius: 10px; font-weight: bold; cursor: pointer; display: none; margin-top: 10px; font-family: inherit;
        }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; display: none; margin-top: 10px; }
        .que-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); }
        .que-header { padding: 12px; text-align: center; background: #2a2a2a; border-bottom: 1px solid var(--border); }
        .que-name { font-size: 1.1rem; color: var(--gold); margin: 0; font-weight: 600; }
        .que-cung { font-size: 0.65rem; color: #888; margin-top: 4px; text-transform: uppercase; }
        .hex-container { padding: 20px 10px; display: flex; flex-direction: column-reverse; gap: 12px; }
        .hao-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; height: 28px; }
        .nap-giap { width: 140px; font-size: 0.75rem; color: #ccc; white-space: nowrap; }
        .line-box { flex-grow: 1; height: 10px; position: relative; display: flex; align-items: center; justify-content: center; }
        .line-yang { width: 100%; height: 100%; background: var(--gold); border-radius: 2px; }
        .line-yin { width: 100%; height: 100%; display: flex; justify-content: space-between; }
        .line-yin::before, .line-yin::after { content: ""; width: 44%; height: 100%; background: var(--gold); border-radius: 2px; }
        .symbol-dong { position: absolute; font-weight: bold; font-size: 1.1rem; z-index: 2; text-shadow: 0 0 5px rgba(0,0,0,1); }
        .is-dong-yang { color: #000; }
        .is-dong-yin { color: var(--primary); }
        .the-ung { width: 35px; font-size: 0.7rem; font-weight: bold; text-align: right; }
        .label-the { color: var(--primary); }
        .label-ung { color: var(--accent); }
        @media (max-width: 500px) { .result-grid { grid-template-columns: 1fr; } }
    </style>
</head>

<div class="container">
    <div class="header"><h1>Dịch Lý Huyền Cơ</h1></div>

        <label>Chọn Hào Động</label>

            <div class="dong-item" onclick="toggleDong(6)"><span>Hào 6</span></div>
        </div>
        <button id="btnCopy" class="btn-copy" onclick="copyToClipboard()">📋 SAO CHÉP KẾT QUẢ</button>
    </div>
    <div id="resultGrid" class="result-grid">
        <div class="que-card">
            <div class="que-header"><p id="resCungChu" class="que-cung"></p><h2 id="resNameChu" class="que-name"></h2></div>

            <div id="hexBien" class="hex-container"></div>
        </div>
    </div>
</div>

        "Thủy Địa Tỷ": { c: "010000", n: ["Huynh Đệ Mùi Thổ","Phụ Mẫu Tỵ Hỏa","Quan Quỷ Mão Mộc (Thế)","Tử Tôn Thân Kim","Huynh Đệ Tuất Thổ","Thê Tài Tý Thuỷ (Ứng)"] }

let currentDong = 0;
let bienQueGiam = null;

// HÀM QUAN TRỌNG: Tách địa chi + ngũ hành chuẩn không bị sót
function extractChiHanh(str) {
    let clean = str.replace("(Thế)", "").replace("(Ứng)", "").trim();
    let parts = clean.split(" ");
    if (parts.length >= 2) {
        // Lấy 2 phần tử cuối cùng ví dụ "Ngọ" "Hỏa"
        return parts[parts.length - 2] + " " + parts[parts.length - 1];
    }
    return clean;
}

function getHanh(napName) {
    const hanhs = ["Kim", "Mộc", "Thủy", "Hỏa", "Thổ"];
    for (let h of hanhs) { if (napName.includes(h)) return h; }
    return "";
}

function tinhLucThan(haoHanh, hoChuHanh) {
    const sinh = { "Kim": "Thủy", "Thủy": "Mộc", "Mộc": "Hỏa", "Hỏa": "Thổ", "Thổ": "Kim" };
    const khac = { "Kim": "Mộc", "Mộc": "Thổ", "Thổ": "Thủy", "Thủy": "Hỏa", "Hỏa": "Kim" };
    if (haoHanh === hoChuHanh) return "Huynh Đệ";
    if (sinh[haoHanh] === hoChuHanh) return "Phụ Mẫu";
    if (sinh[hoChuHanh] === haoHanh) return "Tử Tôn";
    if (khac[haoHanh] === hoChuHanh) return "Quan Quỷ";
    if (khac[hoChuHanh] === haoHanh) return "Thê Tài";
    return "";
}

function updateQueList() {
    const cung = document.getElementById("selectCung").value;
    const queSelect = document.getElementById("selectQue");
    queSelect.innerHTML = '<option value="">-- Chọn quẻ --</option>';
    if (cung && dataDich[cung]) {
        Object.keys(dataDich[cung].quẻ).forEach(qName => {
            let opt = document.createElement("option");
            opt.value = qName; opt.text = qName;
            queSelect.appendChild(opt);
        });
    }
    processDich();
}

function toggleDong(num) {
    currentDong = (currentDong === num) ? 0 : num;
    const items = document.querySelectorAll('.dong-item');
    items.forEach((item, idx) => {
        if (idx + 1 === currentDong) item.classList.add('active');
        else item.classList.remove('active');
    });
    processDich();
}

function findQueByCode(code) {
    for (let cungKey in dataDich) {
        for (let qName in dataDich[cungKey].quẻ) {
            if (dataDich[cungKey].quẻ[qName].c === code) {
                return { name: qName, data: dataDich[cungKey].quẻ[qName], cung: dataDich[cungKey] };
            }
        }
    }
    return null;
}

function processDich() {
    const cungKeyChu = document.getElementById("selectCung").value;
    const qNameChu = document.getElementById("selectQue").value;
    if (!cungKeyChu || !qNameChu) { 
        document.getElementById("resultGrid").style.display = "none"; 
        document.getElementById("btnCopy").style.display = "none";
        return; 
    }
    const chuData = dataDich[cungKeyChu].quẻ[qNameChu];
    const chuCung = dataDich[cungKeyChu];
    renderQue("hexChu", "resNameChu", "resCungChu", qNameChu, chuData, chuCung, currentDong);
    if (currentDong > 0) {
        let chuCodeArr = chuData.c.split("");
        let bitIndex = 6 - currentDong;
        chuCodeArr[bitIndex] = chuCodeArr[bitIndex] === "1" ? "0" : "1";
        let bienCode = chuCodeArr.join("");
        bienQueGiam = findQueByCode(bienCode);
        if (bienQueGiam) {
            document.getElementById("cardBien").style.display = "block";
            renderQue("hexBien", "resNameBien", "resCungBien", bienQueGiam.name, bienQueGiam.data, bienQueGiam.cung, 0, chuData, chuCung);
        }
    } else {
        document.getElementById("cardBien").style.display = "none";
        bienQueGiam = null;
    }
    document.getElementById("resultGrid").style.display = "grid";
    document.getElementById("btnCopy").style.display = "block";
}

function renderQue(containerId, nameId, cungId, name, que, cung, dongHao, dataChu = null, cungChu = null) {
    document.getElementById(nameId).innerText = name;
    document.getElementById(cungId).innerText = `HỌ ${cung.name.toUpperCase()} - CUNG ${cung.hanh}`;
    const container = document.getElementById(containerId);
    container.innerHTML = "";
    const isQueBien = dataChu !== null; 
    const thuongDong = (currentDong >= 4 && currentDong <= 6);
    const haDong = (currentDong >= 1 && currentDong <= 3);

    for (let i = 0; i < 6; i++) {
        const haoThu = i + 1;
        const row = document.createElement("div");
        row.className = "hao-row";
        const isYang = que.c[5 - i] === "1";
        let displayNap = "";
        if (isQueBien) {
            const isHaoThuong = (haoThu >= 4);
            // Logic chuẩn: Nếu đơn quái có động thì tính lục thân mới dựa trên địa chi quẻ biến và HỌ quẻ chủ
            if ((isHaoThuong && thuongDong) || (!isHaoThuong && haDong)) {
                let chiHanhStr = extractChiHanh(que.n[i]);
                let lucThanMoi = tinhLucThan(getHanh(chiHanhStr), cungChu.hanh);
                displayNap = lucThanMoi + " " + chiHanhStr;
            } else {
                // Không động thì copy y nguyên quẻ chủ
                displayNap = dataChu.n[i];
            }
        } else {
            displayNap = que.n[i];
        }
        let label = ""; let labelClass = "";
        let cleanNap = displayNap.replace("(Thế)", "").replace("(Ứng)", "").trim();
        if(displayNap.includes("(Thế)")) { label = "Thế"; labelClass = "label-the"; }
        else if(displayNap.includes("(Ứng)")) { label = "Ứng"; labelClass = "label-ung"; }
        let symbol = "";
        if (haoThu === dongHao) {
            symbol = isYang ? '<span class="symbol-dong is-dong-yang">O</span>' : '<span class="symbol-dong is-dong-yin">X</span>';
        }
        row.innerHTML = `
            <div class="nap-giap">${cleanNap}</div>
            <div class="line-box">
                ${symbol}
                ${isYang ? '<div class="line-yang"></div>' : '<div class="line-yin"></div>'}
            </div>
            <div class="the-ung ${labelClass}">${label}</div>
        `;
        container.appendChild(row);
    }
}

function copyToClipboard() {
    const cungChuKey = document.getElementById("selectCung").value;
    const nameChu = document.getElementById("selectQue").value;
    const chuData = dataDich[cungChuKey].quẻ[nameChu];
    const cungChu = dataDich[cungChuKey];
    let text = `Quẻ Chủ: ${nameChu} (Họ ${cungChu.name})\n`;
    for(let i=5; i>=0; i--) {
        let n = chuData.n[i];
        let line = `Hào ${i+1}: ${n}`;
        if(i+1 === currentDong) line += " [Động]";
        text += line + "\n";
    }
    if(bienQueGiam) {
        text += `\nQuẻ Biến: ${bienQueGiam.name} (Lục Thân tính theo Họ ${cungChu.name})\n`;
        const thuongDong = (currentDong >= 4 && currentDong <= 6);
        const haDong = (currentDong >= 1 && currentDong <= 3);
        for(let i=5; i>=0; i--) {
            let haoThu = i + 1;
            let displayNap = "";
            const isHaoThuong = (haoThu >= 4);
            if ((isHaoThuong && thuongDong) || (!isHaoThuong && haDong)) {
                let chiHanhStr = extractChiHanh(bienQueGiam.data.n[i]);
                displayNap = tinhLucThan(getHanh(chiHanhStr), cungChu.hanh) + " " + chiHanhStr;
            } else {
                displayNap = chuData.n[i];
            }
            text += `Hào ${haoThu}: ${displayNap}\n`;
        }
    }
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById("btnCopy");
        btn.innerText = "✅ ĐÃ SAO CHÉP!";
        setTimeout(() => { btn.innerText = "📋 SAO CHÉP KẾT QUẢ"; }, 2000);
    });
}
