<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liên Hoa 12 Không Thời</title>
<style>
:root { --gold:#f1c40f; --dark:#121212; --card:#1e1e1e; }
body {
    font-family: -apple-system, sans-serif;
    background: var(--dark);
    color: #fff;
    display: flex;
    justify-content: center;
    padding: 20px;
}
.container {
    width: 100%;
    max-width: 700px;
    background: var(--card);
    padding: 20px;
    border-radius: 16px;
}
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #000;
    color: #fff;
    box-sizing: border-box;
}
input.error {
    border: 1px solid #e74c3c;
}
.preview {
    margin-top: 20px;
    padding: 15px;
    background: #000;
    border-radius: 10px;
    white-space: pre-wrap; /* Đổi thành pre-wrap để hiển thị tốt trên mobile */
    font-family: monospace;
    font-size: 14px;
    line-height: 1.4;
    border: 1px solid #333;
    min-height: 50px;
}
button {
    margin-top: 10px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--gold);
    font-weight: bold;
    cursor: pointer;
}
button:active { opacity: 0.8; }
</style>
</head>
<body>
<div class="container">
<h3 style="text-align:center; color:var(--gold)">Bảng Quẻ Liên Hoa</h3>
<div id="inputs"></div>
<div id="preview" class="preview">Kết quả sẽ hiện ở đây...</div>
<button onclick="copyAll()">Sao chép toàn bộ</button>
</div>

<script>
const headers = ["Chính", "Hỗ", "Biến"];
const trigramMap = {
    "km": "Khảm", "kh": "Khôn", "ch": "Chấn", "k": "Kiền",
    "đ": "Đoài", "l": "Ly", "c": "Cấn", "t": "Tốn"
};

function normalizeToken(token) {
    if(!token) return null;
    let raw = token.trim();
    let key = raw.toLowerCase();
    if (trigramMap[key]) return trigramMap[key];
    const fullNames = Object.values(trigramMap);
    if (fullNames.includes(raw)) return raw;
    return null;
}

// Tạo 12 ô nhập liệu
const inputsDiv = document.getElementById("inputs");
for (let i = 1; i <= 12; i++) {
    const input = document.createElement("input");
    input.placeholder = `${i}. Ví dụ: k ch t c km l`;
    input.id = "input" + i;
    input.addEventListener("input", update);
    inputsDiv.appendChild(input);
}

function parseLine(str, inputEl) {
    // Tách số thứ tự và phần nội dung quẻ
    let match = str.trim().match(/^(\d+)\s+(.*)$/);
    if (!match) return null;

    let index = match[1];
    let content = match[2];

    // Tách các quẻ bằng dấu phẩy hoặc khoảng trắng, loại bỏ phần tử rỗng
    let rawArr = content.split(/[,\s]+/).filter(s => s.trim() !== "");
    
    if (rawArr.length < 6) return null;

    let arr = [];
    let hasError = false;
    for (let i = 0; i < 6; i++) {
        let val = normalizeToken(rawArr[i]);
        if (!val) {
            hasError = true;
            val = rawArr[i]; // Giữ nguyên để báo lỗi
        }
        arr.push(val);
    }

    if (hasError) {
        inputEl.classList.add("error");
    } else {
        inputEl.classList.remove("error");
    }
    
    return { index: index, data: arr };
}

function buildTable(obj) {
    const arr = obj.data;
    const data = [
        headers,
        [arr[0], arr[2], arr[4]],
        [arr[1], arr[3], arr[5]]
    ];

    // Tính toán độ rộng cột tự động
    const colWidths = [0, 1, 2].map(i => 
        Math.max(...data.map(row => row[i].length))
    );

    const pad = (t, w) => t + " ".repeat(Math.max(0, w - t.length));
    
    const headerRow = data[0].map((c, i) => pad(c, colWidths[i])).join(" | ");
    const separator = colWidths.map(w => "-".repeat(w)).join("-+-");
    const row1 = data[1].map((c, i) => pad(c, colWidths[i])).join(" | ");
    const row2 = data[2].map((c, i) => pad(c, colWidths[i])).join(" | ");

    return obj.index + "\n" + headerRow + "\n" + separator + "\n" + row1 + "\n" + row2;
}

function update() {
    let result = [];
    for (let i = 1; i <= 12; i++) {
        let inputEl = document.getElementById("input" + i);
        let val = inputEl.value;
        if (!val.trim()) {
            inputEl.classList.remove("error");
            continue;
        }
        let parsed = parseLine(val, inputEl);
        if (parsed) {
            result.push(buildTable(parsed));
        }
    }
    const previewEl = document.getElementById("preview");
    if(result.length > 0) {
        previewEl.innerText = result.join("\n\n");
    } else {
        previewEl.innerText = "Đang chờ nhập đủ dữ liệu (Số TT + 6 quẻ)...";
    }
}

function copyAll() {
    const text = document.getElementById("preview").innerText.trim();
    if(!text || text.startsWith("Đang chờ")) return;
    
    navigator.clipboard.writeText(text).then(() => {
        alert("Đã copy toàn bộ bảng quẻ 👍");
    });
}
</script>
</body>
</html>
