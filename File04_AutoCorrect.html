<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRÍCH XUẤT 04 - LÁ NGƯỢC (N)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap');

        :root {
            --bg:          #e8f0eb;
            --card:        #f7fbf8;
            --primary:     #1e4d2b;
            --accent:      #3a7d4e;
            --accent2:     #6aab7e;
            --accent3:     #a8d4b4;
            --border:      #c2deca;
            --input-bg:    #ffffff;
            --input-focus: #f0faf3;
            --label:       #2a5c38;
            --result-bg:   #f2f9f4;
            --result-border:#7ec49a;
            --shadow-card: 0 8px 40px rgba(30,77,43,0.13), 0 2px 8px rgba(30,77,43,0.07);
            --shadow-inp:  0 2px 10px rgba(30,77,43,0.08);
            --btn-find1:   #1e4d2b;
            --btn-find2:   #3a7d4e;
            --btn-copy1:   #1a3a5c;
            --btn-copy2:   #2563a8;
            --gold-light:  #e8d5a3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Be Vietnam Pro', 'Segoe UI', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(106,171,126,0.15) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 90%, rgba(30,77,43,0.10) 0%, transparent 55%);
            min-height: 100vh;
            padding: 24px 14px 56px;
            color: var(--primary);
        }

        /* ── CARD ── */
        .container {
            max-width: 600px;
            margin: auto;
            background: var(--card);
            border-radius: 24px;
            box-shadow: var(--shadow-card);
            border: 1.5px solid var(--border);
            overflow: hidden;
        }

        /* ── HEADER ── */
        .card-header {
            background: linear-gradient(140deg, #1a4226 0%, #3a7d4e 60%, #4e9e67 100%);
            padding: 30px 28px 36px;
            text-align: center;
            position: relative;
        }
        .card-header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 22px;
            background: var(--card);
            border-radius: 20px 20px 0 0;
        }
        .header-badge {
            display: inline-block;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            color: var(--gold-light);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            padding: 4px 16px;
            border-radius: 20px;
            margin-bottom: 12px;
        }
        h2 {
            font-family: 'Playfair Display', serif;
            color: #ffffff;
            font-size: clamp(20px, 5.5vw, 30px);
            font-weight: 700;
            letter-spacing: 0.3px;
            line-height: 1.3;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .subtitle {
            color: rgba(255,255,255,0.68);
            font-size: 13px;
            letter-spacing: 0.2px;
        }
        .subtitle em {
            color: var(--gold-light);
            font-style: normal;
            font-weight: 700;
        }

        /* ── BODY ── */
        .card-body { padding: 22px 22px 0; }

        /* ── FORM ITEM ── */
        .f-item {
            margin-bottom: 15px;
            position: relative;
        }
        .f-label-row {
            display: flex;
            align-items: center;
            gap: 9px;
            margin-bottom: 7px;
        }
        .f-num {
            width: 27px; height: 27px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 2px 7px rgba(58,125,78,0.28);
        }
        label {
            font-weight: 700;
            font-size: 13px;
            color: var(--label);
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .f-tag {
            margin-left: auto;
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            background: rgba(106,171,126,0.14);
            border: 1px solid var(--accent3);
            padding: 2px 10px;
            border-radius: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 13px;
            font-size: 21px;
            font-weight: 700;
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--input-bg);
            color: var(--primary);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            outline: none;
            letter-spacing: 0.8px;
            box-shadow: var(--shadow-inp);
        }
        input[type="text"]:focus {
            border-color: var(--accent);
            background: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(58,125,78,0.14), var(--shadow-inp);
        }
        input[type="text"]::placeholder {
            color: #b0ccb8;
            font-size: 15px;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* ── SUGGEST POPUP ── */
        .suggest-box {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            z-index: 300;
            background: #fff;
            border: 2px solid var(--accent2);
            border-radius: 14px;
            box-shadow: 0 12px 36px rgba(30,77,43,0.20);
            overflow: hidden;
            min-width: 220px;
        }
        .suggest-box.show { display: block; }
        .suggest-header {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            padding: 9px 16px;
            color: rgba(255,255,255,0.9);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }
        .suggest-btn {
            display: flex;
            align-items: center;
            gap: 11px;
            width: 100%;
            padding: 13px 16px;
            font-size: 17px;
            font-weight: 700;
            font-family: 'Be Vietnam Pro', sans-serif;
            background: none;
            border: none;
            border-top: 1px solid #e4f0e8;
            cursor: pointer;
            text-align: left;
            color: var(--primary);
            transition: background 0.14s, color 0.14s;
            letter-spacing: 0.5px;
        }
        .suggest-btn:hover, .suggest-btn:active {
            background: var(--result-bg);
            color: var(--accent);
        }
        .s-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
            font-weight: 800;
            flex-shrink: 0;
            letter-spacing: 0;
        }
        .s-desc {
            display: flex;
            flex-direction: column;
        }
        .s-name { font-size: 17px; font-weight: 700; color: var(--primary); }
        .s-hint { font-size: 11px; font-weight: 500; color: var(--accent2); margin-top: 1px; }

        /* ── DIVIDER ── */
        .divider {
            border: none;
            border-top: 1.5px solid var(--border);
            margin: 20px 0 18px;
        }

        /* ── BUTTONS ── */
        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 11px;
            padding: 0 22px;
        }
        .btn-find, .btn-copy {
            padding: 17px 20px;
            font-size: 17px;
            font-weight: 700;
            font-family: 'Be Vietnam Pro', sans-serif;
            border: none;
            border-radius: 14px;
            color: #fff;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 0.8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.13s, box-shadow 0.13s;
        }
        .btn-find {
            background: linear-gradient(135deg, var(--btn-find1) 0%, var(--btn-find2) 100%);
            box-shadow: 0 5px 18px rgba(30,77,43,0.30);
        }
        .btn-find:hover { box-shadow: 0 7px 26px rgba(30,77,43,0.40); }
        .btn-copy {
            background: linear-gradient(135deg, var(--btn-copy1) 0%, var(--btn-copy2) 100%);
            box-shadow: 0 5px 16px rgba(26,58,92,0.24);
        }
        .btn-copy:hover { box-shadow: 0 7px 22px rgba(26,58,92,0.34); }
        .btn-find:active, .btn-copy:active {
            transform: translateY(3px);
            box-shadow: none !important;
        }

        /* ── RESULT ── */
        #display {
            margin: 18px 22px 0;
            padding: 18px 20px;
            border: 1.5px solid var(--result-border);
            border-left: 5px solid var(--accent2);
            border-radius: 14px;
            min-height: 80px;
            white-space: pre-wrap;
            background: var(--result-bg);
            font-size: 16px;
            line-height: 1.85;
            font-weight: 600;
            color: var(--primary);
            font-family: 'Be Vietnam Pro', sans-serif;
            box-shadow: inset 0 2px 8px rgba(30,77,43,0.05);
        }
        #display:empty::before {
            content: 'Kết quả sẽ hiển thị tại đây…';
            color: #aac9b4;
            font-weight: 400;
            font-style: italic;
            font-size: 15px;
        }

        /* ── FOOTER ── */
        .card-footer {
            margin-top: 20px;
            padding: 14px 22px 20px;
            text-align: center;
            color: var(--accent3);
            font-size: 12px;
            letter-spacing: 0.3px;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 480px) {
            body { padding: 12px 8px 48px; }
            .card-body { padding: 18px 14px 0; }
            .action-btns { padding: 0 14px; }
            #display { margin: 16px 14px 0; font-size: 15px; }
            input[type="text"] { font-size: 18px; padding: 12px 14px; }
            .btn-find, .btn-copy { font-size: 15px; padding: 15px; }
            .card-footer { padding: 12px 14px 18px; }
        }
    </style>
</head>

// ==================== THUẬT TOÁN GỐC (GIỮ NGUYÊN) ====================
function getRankValue(name) {
    let n = name.toUpperCase();
    for (let i = 0; i < RANKING.length; i++) { if (n.includes(RANKING[i])) return i; }
    return 99;
}
function searchLogic(chu, gap, gapIsRight) {
    const lines = DATA_04.split('\n');
    let currentChu = "", targetChu = chu.toUpperCase().trim();
    let targetGap = "GẶP " + gap.toUpperCase().trim();
    for (let i = 0; i < lines.length; i++) {
        let rawLine = lines[i].trim(); if (!rawLine) continue;
        let lineUp = rawLine.toUpperCase();
        if (lineUp.includes(":") && !lineUp.startsWith("GẶP")) {
            if (lineUp.includes(targetChu)) { currentChu = targetChu; continue; }
            else { currentChu = ""; }
        }
        if (currentChu === targetChu && lineUp.startsWith(targetGap)) {
            let content = rawLine.split(":")[1]; if (!content) return null;
            let parts = content.split("|");
            return gapIsRight ? (parts[1] ? parts[1].trim() : parts[0].trim()) : parts[0].trim();
        }
    }
    return null;
}
function runAnalysis() {
    const inputs = ['m1','m2','m3','m4'].map(id => document.getElementById(id).value.trim());
    let results = [];
    for (let i = 0; i < 3; i++) {
        let A = inputs[i], B = inputs[i+1];
        if (!A || !B) continue;
        let val = searchLogic(A, B, true);
        if (!val && getRankValue(B) <= getRankValue(A)) val = searchLogic(B, A, false);
        results.push(val
            ? `Cặp ${i+1}  (${A}  ⟶  ${B})\n➤  ${val}`
            : `Cặp ${i+1}  (${A}  ⟶  ${B})\n➤  Không có dữ liệu phối hợp phù hợp`
        );
    }
    document.getElementById('display').innerText = results.join("\n\n───────────────────\n\n");
}
function copyData() {
    const res = document.getElementById('display').innerText;
    if (!res) return;
    const doCopy = t => { const e=document.createElement('textarea'); e.value=t; e.style.cssText='position:fixed;opacity:0;'; document.body.appendChild(e); e.select(); document.execCommand('copy'); document.body.removeChild(e); };
    if (navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(res).then(showCopyOK).catch(()=>{doCopy(res);showCopyOK();});
    else { doCopy(res); showCopyOK(); }
}
function showCopyOK() {
    const btn = document.querySelector('.btn-copy');
    const orig = btn.innerHTML;
    btn.innerHTML = '✅ ĐÃ SAO CHÉP!';
    btn.style.background = 'linear-gradient(135deg,#1a6b3a,#27ae60)';
    setTimeout(()=>{ btn.innerHTML=orig; btn.style.background=''; }, 2000);
}

// ==================== AUTO-CORRECT ENGINE ====================
// Realtime  : uppercase only
// Gợi ý     : hiện NGAY khi token[0] đủ 3 ký tự mơ hồ TƯ/TU
// Correct   : chỉ khi bấm TÌM hoặc Enter

const VALID_PIECES = ['TƯỚNG','SĨ','TƯỢNG','XE','PHÁO','NGỰA','CHỐT'];
const VALID_COLORS = ['XANH','VÀNG','TRẮNG','ĐỎ'];

function removeTones(s) {
    return s.replace(/[àáâãăạảấầẩẫậắằẳẵặ]/gi,'a').replace(/[èéêẹẻẽếềểễệ]/gi,'e')
            .replace(/[ìíĩịỉ]/gi,'i').replace(/[òóôõơọỏốồổỗộớờởỡợ]/gi,'o')
            .replace(/[ùúũưụủứừửữự]/gi,'u').replace(/[ỳýỹỵỷ]/gi,'y').replace(/[đ]/gi,'d')
            .replace(/[ÀÁÂÃĂẠẢẤẦẨẪẬẮẰẲẴẶ]/g,'A').replace(/[ÈÉÊẸẺẼẾỀỂỄỆ]/g,'E')
            .replace(/[ÌÍĨỊỈ]/g,'I').replace(/[ÒÓÔÕƠỌỎỐỒỔỖỘỚỜỞỠỢ]/g,'O')
            .replace(/[ÙÚŨƯỤỦỨỪỬỮỰ]/g,'U').replace(/[ỲÝỸỴỶ]/g,'Y').replace(/[Đ]/g,'D');
}
function editDist(a,b) {
    const m=a.length,n=b.length;
    const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i?j?0:i:j));
    for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
        dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
    return dp[m][n];
}

// Kiểm tra mơ hồ TƯỚNG/TƯỢNG
function isAmbiguous(token) {
    if (!token) return false;
    const up = token.toUpperCase();
    const t = removeTones(up);
    if (!t.startsWith('TU') && !up.startsWith('TƯ')) return false;
    if (t.length < 3) return false;
    // Nếu ký tự thứ 4 trở đi đã phân biệt được → không còn mơ hồ
    if (t.length >= 4) {
        const c4=t[3], up4=up[3]||'';
        if (up4==='Ớ'||up4==='Ơ'||c4==='N') return false;
        if (up4==='Ợ'||up4==='Ọ'||c4==='Q'||c4==='G') return false;
    }
    return true;
}

function fixPiece(token) {
    if (!token) return {result:'',ambiguous:false};
    const up=token.toUpperCase(), t=removeTones(up);
    if (VALID_PIECES.includes(up)) return {result:up,ambiguous:false};
    if (t==='XE') return {result:'XE',ambiguous:false};
    if (t.startsWith('SI')||up.startsWith('SĨ')) return {result:'SĨ',ambiguous:false};
    if (t.startsWith('PH')) return {result:'PHÁO',ambiguous:false};
    if (t.startsWith('NG')) return {result:'NGỰA',ambiguous:false};
    if (t.startsWith('CH')) return {result:'CHỐT',ambiguous:false};
    if (t.startsWith('TU')||up.startsWith('TƯ')) {
        if (isAmbiguous(up)) return {result:up,ambiguous:true};
        if (t.length>=4) {
            const c4=t[3],up4=up[3]||'';
            if (up4==='Ớ'||up4==='Ơ'||c4==='N') return {result:'TƯỚNG',ambiguous:false};
            if (up4==='Ợ'||up4==='Ọ'||c4==='Q'||c4==='G') return {result:'TƯỢNG',ambiguous:false};
        }
        return {result:up,ambiguous:true};
    }
    if (t.length>=3) {
        let best=null,bd=999,sd=999;
        for (const p of VALID_PIECES){const d=editDist(t,removeTones(p));if(d<bd){sd=bd;bd=d;best=p;}else if(d<sd)sd=d;}
        if (bd<=2&&sd>bd){
            if(best==='TƯỚNG'||best==='TƯỢNG') return {result:up,ambiguous:true};
            return {result:best,ambiguous:false};
        }
    }
    return {result:up,ambiguous:false};
}

function fixColor(token) {
    if (!token) return '';
    const up=token.toUpperCase();
    if (VALID_COLORS.includes(up)) return up;
    if (up.length<2) return up;
    const t=removeTones(up);
    if (t.startsWith('XA')) return 'XANH';
    if (t.startsWith('VA')||up.startsWith('VÀ')) return 'VÀNG';
    if (t.startsWith('TR')) return 'TRẮNG';
    if (t.startsWith('DO')||up.startsWith('Đ')) return 'ĐỎ';
    let best=null,bd=999;
    for(const c of VALID_COLORS){const d=editDist(t,removeTones(c));if(d<bd){bd=d;best=c;}}
    return (bd<=2&&best)?best:up;
}

function correctInput(inp) {
    const raw=inp.value.toUpperCase().trim(); if(!raw) return;
    const tokens=raw.split(/\s+/).filter(Boolean); if(!tokens.length) return;
    let out=[], amb=false;
    const {result:r0,ambiguous:a0}=fixPiece(tokens[0]);
    out.push(r0||tokens[0]); if(a0) amb=true;
    if (tokens[1]) out.push(fixColor(tokens[1]));
    if (tokens[2]) out.push('N');
    inp.value=out.join(' ');
    if (amb) showSuggest(inp.id);
}

// ── Suggest ──
function showSuggest(id) { const b=document.getElementById('sug_'+id); if(b) b.classList.add('show'); }
function hideSuggest(id) { const b=document.getElementById('sug_'+id); if(b) b.classList.remove('show'); }
function hideAllSuggest() { document.querySelectorAll('.suggest-box').forEach(b=>b.classList.remove('show')); }

function pickSuggest(inputId, piece) {
    const inp=document.getElementById(inputId); if(!inp) return;
    const tokens=inp.value.toUpperCase().trim().split(/\s+/).filter(Boolean);
    tokens[0]=piece;
    inp.value=tokens.join(' ');
    hideSuggest(inputId);
    inp.focus();
    try{inp.setSelectionRange(inp.value.length,inp.value.length);}catch(e){}
}

// ── Realtime: uppercase + check gợi ý ngay ──
function onType(inp) {
    const caret=inp.selectionStart, oldLen=inp.value.length;
    inp.value=inp.value.toUpperCase();
    const diff=inp.value.length-oldLen;
    try{inp.setSelectionRange(caret+diff,caret+diff);}catch(e){}

    // Hiện/ẩn gợi ý ngay lập tức dựa trên token[0]
    const tokens=inp.value.trim().split(/\s+/).filter(Boolean);
    if (tokens[0]&&isAmbiguous(tokens[0])) showSuggest(inp.id);
    else hideSuggest(inp.id);
}

function onBlurInput(inp) {
    // Delay nhỏ để mousedown của suggest-btn kịp fire trước
    setTimeout(()=>hideSuggest(inp.id), 160);
}

function onKeyDown(e, inp) {
    if (e.key==='Enter') {
        e.preventDefault();
        correctInput(inp);
        const ids=['m1','m2','m3','m4'];
        const idx=ids.indexOf(inp.id);
        if (idx<3) document.getElementById(ids[idx+1]).focus();
        else submitAll();
    }
}

function submitAll() {
    hideAllSuggest();
    ['m1','m2','m3','m4'].forEach(id=>{
        const inp=document.getElementById(id);
        if(inp.value.trim()) correctInput(inp);
    });
    runAnalysis();
}
