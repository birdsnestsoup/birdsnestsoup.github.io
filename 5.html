<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRÍCH XUẤT 05 - LÁ ĐỨNG (Đ) & NGƯỢC (N)</title>
    <style>
        :root {
            --sage:    #4a7c59;
            --sage-dk: #2e5c3e;
            --sage-lt: #eaf4ec;
            --cream:   #faf8f3;
            --mist:    #8a9e8e;
            --amber:   #c8864a;
            --sky:     #4a7fa5;
            --sky-dk:  #2d5f80;
            --warn:    #c07040;
            --text:    #2c3a2e;
            --border:  #c8d8ca;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #dce8dd 0%, #e8e0d0 100%);
            min-height: 100vh;
            padding: 16px;
            color: var(--text);
        }

        .wrapper {
            max-width: 560px;
            margin: 0 auto;
            background: var(--cream);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(46,92,62,0.13), 0 2px 8px rgba(0,0,0,0.07);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--sage-dk) 0%, var(--sage) 100%);
            padding: 22px 20px 18px;
            text-align: center;
        }
        .header h2 {
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.04em;
            line-height: 1.5;
            text-transform: uppercase;
        }
        .header small {
            display: block;
            margin-top: 5px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            font-weight: 400;
        }

        .body { padding: 20px 18px 24px; }

        .pair-section {
            background: var(--sage-lt);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 14px 14px 10px;
            margin-bottom: 14px;
        }
        .pair-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: var(--sage-dk);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .pair-label::before {
            content: '';
            display: inline-block;
            width: 8px; height: 8px;
            background: var(--sage);
            border-radius: 50%;
        }
        .pair-label .hint {
            font-weight: 400;
            color: var(--mist);
            font-size: 10px;
            text-transform: none;
            letter-spacing: 0;
        }

        .form-row { margin-bottom: 10px; position: relative; }

        .form-row label {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 12px;
            font-weight: 600;
            color: var(--sage-dk);
            margin-bottom: 5px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .lbl-badge {
            display: inline-flex;
            align-items: center; justify-content: center;
            width: 22px; height: 22px;
            border-radius: 50%;
            font-size: 11px; font-weight: 700;
            flex-shrink: 0;
        }
        .lbl-badge.d { background: var(--sage);  color: #fff; }
        .lbl-badge.n { background: var(--amber); color: #fff; }

        /* preview chip nhỏ bên phải label */
        .preview-chip {
            margin-left: auto;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 0.03em;
            background: #e0e0e0;
            color: #999;
            min-width: 24px;
            text-align: center;
            transition: background .2s, color .2s;
            white-space: nowrap;
        }
        .preview-chip.valid   { background: var(--sage-lt); color: var(--sage-dk); border: 1px solid var(--sage); }
        .preview-chip.partial { background: #fff8f0; color: var(--amber); border: 1px solid var(--amber); }

        .input-wrap { position: relative; }

        input.in-card {
            width: 100%;
            padding: 13px 44px 13px 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.05em;
            background: #fff;
            color: var(--text);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            font-family: inherit;
            /* KHÔNG dùng ime-mode hay text-transform để tránh can thiệp gõ */
        }
        input.in-card:focus {
            border-color: var(--sage);
            box-shadow: 0 0 0 3px rgba(74,124,89,0.12);
        }
        /* Màu viền sau khi đã correct */
        input.in-card.corrected {
            border-color: var(--sage);
            background: #f4fbf5;
        }

        /* Badge Đ/N góc phải input */
        .kh-badge {
            position: absolute;
            right: 10px; top: 50%;
            transform: translateY(-50%);
            width: 28px; height: 28px;
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 800;
            pointer-events: none;
            transition: all .2s;
            background: #eee; color: #bbb;
        }
        .kh-badge.d  { background: #d6eedd; color: var(--sage-dk); }
        .kh-badge.n  { background: #fef0e0; color: var(--amber); }

        /* TƯỚNG/TƯỢNG suggestion */
        .suggest-box {
            display: none;
            position: absolute;
            left: 0; top: calc(100% + 5px);
            z-index: 99;
            background: #fff;
            border: 2px solid var(--sage);
            border-radius: 11px;
            box-shadow: 0 6px 20px rgba(46,92,62,0.16);
            overflow: hidden;
            min-width: 220px;
        }
        .suggest-box.open { display: block; }
        .suggest-title {
            font-size: 10px; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--mist);
            padding: 7px 13px 4px;
            background: var(--sage-lt);
        }
        .suggest-item {
            padding: 12px 15px;
            font-size: 16px; font-weight: 700;
            cursor: pointer;
            border-top: 1px solid var(--sage-lt);
            color: var(--text);
            transition: background .13s;
        }
        .suggest-item:hover, .suggest-item:active { background: var(--sage-lt); }

        /* Buttons */
        .btn-container {
            display: flex; flex-direction: column;
            gap: 10px; margin-top: 6px;
        }
        button.btn-action {
            width: 100%; padding: 16px;
            font-size: 16px; font-weight: 700;
            border: none; border-radius: 12px;
            color: #fff; cursor: pointer;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            transition: transform .12s, filter .15s;
            font-family: inherit;
        }
        button.btn-action:active { transform: scale(0.97); filter: brightness(0.92); }
        .btn-search {
            background: linear-gradient(135deg, var(--sage-dk), var(--sage));
            box-shadow: 0 4px 14px rgba(46,92,62,0.28);
        }
        .btn-copy {
            background: linear-gradient(135deg, var(--sky-dk), var(--sky));
            box-shadow: 0 4px 14px rgba(45,95,128,0.26);
        }

        #output {
            margin-top: 18px;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 14px;
            min-height: 60px;
            white-space: pre-wrap;
            background: #fff;
            font-size: 16px;
            line-height: 1.75;
            font-weight: 600;
            color: var(--text);
            font-family: inherit;
        }
        #output:empty::before {
            content: 'Kết quả sẽ hiển thị tại đây…';
            color: #bbb;
            font-weight: 400;
            font-style: italic;
        }

        .footer {
            text-align: center;
            font-size: 10px;
            color: var(--mist);
            padding: 10px 0 4px;
            letter-spacing: 0.06em;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <h2>DÒ Ý NGHĨA FILE 05</h2>
        <small>Lá Đứng (Đ) gặp Lá Ngược (N) · Auto Correct khi bấm TÌM</small>
    </div>

    <div class="body">

        <div class="pair-section">
            <div class="pair-label">Cặp 1 <span class="hint">— cùng màu, khác ký hiệu</span></div>

            <div class="form-row">
                <label>
                    <span class="lbl-badge d">1</span> Lá 1
                    <span id="chip-f1" class="preview-chip">—</span>
                </label>
                <div class="input-wrap">
                    <input type="text" id="f1" class="in-card"
                        placeholder="Ví dụ: TƯỚNG XANH Đ"
                        autocomplete="off" autocorrect="off" spellcheck="false">
                    <div id="kh-f1" class="kh-badge">·</div>
                    <div id="sug-f1" class="suggest-box">
                        <div class="suggest-title">Chọn quân bài:</div>
                        <div class="suggest-item" data-for="f1" data-val="TƯỚNG">TƯỚNG</div>

                    </div>
                </div>
            </div>

            <div class="form-row">
                <label>
                    <span class="lbl-badge n">2</span> Lá 2
                    <span id="chip-f2" class="preview-chip">—</span>
                </label>
                <div class="input-wrap">
                    <input type="text" id="f2" class="in-card"
                        placeholder="Ví dụ: SĨ XANH N"
                        autocomplete="off" autocorrect="off" spellcheck="false">
                    <div id="kh-f2" class="kh-badge">·</div>
                    <div id="sug-f2" class="suggest-box">
                        <div class="suggest-title">Chọn quân bài:</div>
                        <div class="suggest-item" data-for="f2" data-val="TƯỚNG">TƯỚNG</div>
                        <div class="suggest-item" data-for="f2" data-val="TƯỢNG">TƯỢNG</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="pair-section">
            <div class="pair-label">Cặp 2 <span class="hint">— cùng màu, khác ký hiệu</span></div>

            <div class="form-row">
                <label>
                    <span class="lbl-badge d">3</span> Lá 3
                    <span id="chip-f3" class="preview-chip">—</span>
                </label>
                <div class="input-wrap">
                    <input type="text" id="f3" class="in-card"
                        placeholder="Ví dụ: NGỰA ĐỎ Đ"
                        autocomplete="off" autocorrect="off" spellcheck="false">
                    <div id="kh-f3" class="kh-badge">·</div>
                    <div id="sug-f3" class="suggest-box">
                        <div class="suggest-title">Chọn quân bài:</div>
                        <div class="suggest-item" data-for="f3" data-val="TƯỚNG">TƯỚNG</div>
                        <div class="suggest-item" data-for="f3" data-val="TƯỢNG">TƯỢNG</div>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <label>
                    <span class="lbl-badge n">4</span> Lá 4
                    <span id="chip-f4" class="preview-chip">—</span>
                </label>
                <div class="input-wrap">
                    <input type="text" id="f4" class="in-card"
                        placeholder="Ví dụ: CHỐT ĐỎ N"
                        autocomplete="off" autocorrect="off" spellcheck="false">
                    <div id="kh-f4" class="kh-badge">·</div>
                    <div id="sug-f4" class="suggest-box">
                        <div class="suggest-title">Chọn quân bài:</div>
                        <div class="suggest-item" data-for="f4" data-val="TƯỚNG">TƯỚNG</div>
                        <div class="suggest-item" data-for="f4" data-val="TƯỢNG">TƯỢNG</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="btn-container">
            <button class="btn-action btn-search" onclick="thucHienTruyVan()">🔍 TÌM Ý NGHĨA</button>
            <button class="btn-action btn-copy"   onclick="copyKetQua()">📋 SAO CHÉP KẾT QUẢ</button>
        </div>

        <div id="output"></div>
        <div class="footer">STM · Hệ Thống Trích Xuất File 05</div>
    </div>
</div>

<script>
// ╔══════════════════════════════════════════════════════════════╗
//  AUTO-CORRECT RULES
//  Nguyên tắc:
//  1. Gõ gì → UPPERCASE ngay, KHÔNG sửa gì thêm
//  2. Gợi ý TƯỚNG/TƯỢNG sau 1.5s nếu thấy ký tự TU/TW (không thay)
//  3. Toàn bộ correct CHỈ chạy khi bấm TÌM hoặc Enter trong form
// ╚══════════════════════════════════════════════════════════════╝

const QUAN_LIST = ['TƯỚNG','TƯỢNG','SĨ','XE','PHÁO','NGỰA','CHỐT'];
const MAU_LIST  = ['XANH','VÀNG','TRẮNG','ĐỎ'];

// ── Bảng nhận dạng tên quân (so sánh KHÔNG dấu) ──
function removeAccent(s) {
    return s.normalize('NFD')
        .replace(/[\u0300-\u036f]/g,'')
        .replace(/đ/gi,'d').replace(/Đ/g,'D')
        .toUpperCase();
}

// Trả về: { name:'TƯỚNG', ambig:false } | { name:null, ambig:true } | null
function detectQuan(raw) {
    const u = raw.toUpperCase().trim();
    // Khớp chính xác
    if (QUAN_LIST.includes(u)) return { name: u, ambig: false };

    const na = removeAccent(u);

    // Khớp không dấu chính xác
    const mapExact = {
        'TUONG': null, // ambig
        'TUONG ': null,
        'SI': 'SĨ', 'SY': 'SĨ',
        'XE': 'XE',
        'PHAO': 'PHÁO', 'PHA': 'PHÁO',
        'NGUA': 'NGỰA', 'NGU': 'NGỰA',
        'CHOT': 'CHỐT', 'CHO': 'CHỐT',
    };
    if (mapExact[na] !== undefined) {
        return mapExact[na] ? { name: mapExact[na], ambig: false } : { name: null, ambig: true };
    }

    // Khớp bắt đầu bằng (prefix 2+ ký tự không dấu)
    if (na.startsWith('SI') || na.startsWith('SY')) return { name: 'SĨ', ambig: false };
    if (na === 'X' || na.startsWith('XE'))           return { name: 'XE', ambig: false };
    if (na.startsWith('PH'))                          return { name: 'PHÁO', ambig: false };
    if (na.startsWith('NG'))                          return { name: 'NGỰA', ambig: false };
    if (na.startsWith('CH'))                          return { name: 'CHỐT', ambig: false };
    // TU → ambig TƯỚNG/TƯỢNG
    if (na.startsWith('TU') || na.startsWith('TW'))   return { name: null, ambig: true };

    return null;
}

// Trả về tên màu đúng hoặc null
function detectMau(raw) {
    const u = raw.toUpperCase().trim();
    if (MAU_LIST.includes(u)) return u;

    const na = removeAccent(u);
    if (na.startsWith('XA') || na.startsWith('XH') || na === 'XAN' || na === 'XANH') return 'XANH';
    if (na.startsWith('VA') || na.startsWith('VAN') || na === 'VANG' || na === 'VAG' || na === 'VG') return 'VÀNG';
    if (na.startsWith('TR') || na === 'TRANG' || na === 'TRAC' || na === 'TAG' || na === 'TG') return 'TRẮNG';
    if (na === 'DO' || na === 'D' || u === 'ĐỎ' || u === 'ĐO' || na === 'DE') return 'ĐỎ';
    return null;
}

// Trả về 'Đ', 'N', hoặc null
function detectKyHieu(raw) {
    if (!raw) return null;
    const c = raw.toUpperCase().trim();
    if (c === 'Đ' || c === 'D' || c === 'Đ.') return 'Đ';
    if (c === 'N' || c === 'M')                 return 'N';
    return null;
}

// ── PARSE toàn bộ chuỗi đã uppercase → { quan, mau, kyHieu, ambig } ──
// Không throw, không side-effect
function parseInput(str) {
    const s = str.toUpperCase().trim();
    const tokens = s.split(/\s+/).filter(Boolean);

    let quan = null, mau = null, kyHieu = null, ambig = false;

    // Thử token cuối là ký hiệu
    if (tokens.length >= 1) {
        const last = tokens[tokens.length - 1];
        const kh = detectKyHieu(last);
        if (kh && tokens.length > 1) {
            kyHieu = kh;
            tokens.pop();
        }
    }

    // Thử token cuối là màu
    if (tokens.length >= 1) {
        const last = tokens[tokens.length - 1];
        const m = detectMau(last);
        if (m && tokens.length >= 1) {
            // Chỉ nhận là màu nếu phần còn lại hợp lệ là tên quân
            const rest = tokens.slice(0, -1).join(' ');
            if (!rest || detectQuan(rest) !== null || tokens.length === 1) {
                mau = m;
                tokens.pop();
            }
        }
    }

    // Phần còn lại là tên quân
    const quanStr = tokens.join(' ');
    if (quanStr) {
        const qr = detectQuan(quanStr);
        if (qr) {
            if (qr.ambig) ambig = true;
            else quan = qr.name;
        }
    }

    // Fallback: scan toàn chuỗi tìm màu nếu chưa có
    if (!mau) {
        for (const m of MAU_LIST) {
            if (s.includes(m)) { mau = m; break; }
        }
    }
    // Fallback: scan toàn chuỗi tìm ký hiệu nếu chưa có
    if (!kyHieu) {
        const allTokens = s.split(/\s+/);
        for (const t of allTokens) {
            const kh = detectKyHieu(t);
            if (kh) { kyHieu = kh; break; }
        }
    }

    return { quan, mau, kyHieu, ambig };
}

// ── Build chuỗi đã correct ──
function buildCorrected(quan, mau, kyHieu) {
    const parts = [];
    if (quan) parts.push(quan);
    if (mau)  parts.push(mau);
    if (kyHieu) parts.push(kyHieu);
    return parts.join(' ');
}

// ══════════════════════════════════════════════════════════
//  UI STATE
// ══════════════════════════════════════════════════════════
const suggestTimers = {};

function setupForm(fId) {
    const inp = document.getElementById(fId);
    const khBadge = document.getElementById('kh-' + fId);
    const chip    = document.getElementById('chip-' + fId);
    const sugBox  = document.getElementById('sug-' + fId);

    // ── 1. Chỉ UPPERCASE ngay khi gõ, không làm gì thêm ──
    inp.addEventListener('input', function() {
        const pos = this.selectionStart;
        const upped = this.value.toUpperCase();
        if (upped !== this.value) {
            this.value = upped;
            try { this.setSelectionRange(pos, pos); } catch(e) {}
        }

        // Cập nhật badge Đ/N realtime (chỉ đọc, không sửa)
        const parsed = parseInput(this.value);
        updateKhBadge(khBadge, parsed.kyHieu);
        updateChip(chip, parsed);

        // Gợi ý TƯỚNG/TƯỢNG sau 1.5s — CHỈ hiện popup, không sửa text
        clearTimeout(suggestTimers[fId]);
        if (parsed.ambig) {
            suggestTimers[fId] = setTimeout(() => {
                openSuggest(sugBox);
            }, 1500);
        } else {
            closeSuggest(sugBox);
        }
    });

    // ── 2. Enter → correct và chuyển focus ──
    inp.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            correctField(fId);
            // Focus field tiếp theo
            const order = ['f1','f2','f3','f4'];
            const idx = order.indexOf(fId);
            if (idx < order.length - 1) {
                document.getElementById(order[idx+1]).focus();
            }
        }
    });

    // ── 3. Blur → KHÔNG sửa gì (giữ nguyên những gì user gõ) ──
    inp.addEventListener('blur', function() {
        setTimeout(() => closeSuggest(sugBox), 200);
    });
}

function updateKhBadge(el, kh) {
    if (kh === 'Đ') { el.className = 'kh-badge d'; el.innerText = 'Đ'; }
    else if (kh === 'N') { el.className = 'kh-badge n'; el.innerText = 'N'; }
    else { el.className = 'kh-badge'; el.innerText = '·'; }
}

function updateChip(chip, parsed) {
    if (parsed.quan && parsed.mau && parsed.kyHieu) {
        chip.className = 'preview-chip valid';
        chip.innerText = parsed.quan.slice(0,3) + ' ' + parsed.mau.slice(0,2) + ' ' + parsed.kyHieu;
    } else if (parsed.quan || parsed.mau) {
        chip.className = 'preview-chip partial';
        chip.innerText = '…đang gõ';
    } else {
        chip.className = 'preview-chip';
        chip.innerText = '—';
    }
}

function openSuggest(box)  { box.classList.add('open'); }
function closeSuggest(box) { box.classList.remove('open'); }

// ── Xử lý click vào gợi ý TƯỚNG / TƯỢNG ──
document.querySelectorAll('.suggest-item').forEach(item => {
    item.addEventListener('mousedown', function(e) {
        e.preventDefault();
        const fId = this.dataset.for;
        const val = this.dataset.val;
        const inp = document.getElementById(fId);
        const sugBox = document.getElementById('sug-' + fId);

        // Thay phần tên quân, giữ màu + ký hiệu nếu có
        const parsed = parseInput(inp.value);
        inp.value = buildCorrected(val, parsed.mau, parsed.kyHieu);
        inp.classList.add('corrected');
        closeSuggest(sugBox);

        // Cập nhật badge
        const p2 = parseInput(inp.value);
        updateKhBadge(document.getElementById('kh-' + fId), p2.kyHieu);
        updateChip(document.getElementById('chip-' + fId), p2);
    });
});

// ── correctField: correct MỘT field khi cần ──
function correctField(fId, lockMauFrom) {
    const inp = document.getElementById(fId);
    const raw = inp.value.trim();
    if (!raw) return;

    let parsed = parseInput(raw);

    // Lock màu: f2 lấy màu f1, f4 lấy màu f3
    if (lockMauFrom) {
        const parentParsed = parseInput(document.getElementById(lockMauFrom).value.trim());
        if (parentParsed.mau) parsed.mau = parentParsed.mau;
    }

    if (parsed.quan && parsed.mau && parsed.kyHieu) {
        const corrected = buildCorrected(parsed.quan, parsed.mau, parsed.kyHieu);
        inp.value = corrected;
        inp.classList.add('corrected');
    }

function findData05(laChu, laGap, gapNamBenPhai) {
    const db = DATA_FILE_05.split('\n');
    let currentChuBlock = "";
    let targetChu = laChu.toUpperCase().trim();
    let targetGap = "GẶP " + laGap.toUpperCase().trim();
    for (let i = 0; i < db.length; i++) {
        let row = db[i].trim().toUpperCase();
        if (!row) continue;
        if (row.includes(":") && !row.startsWith("GẶP")) {
            if (row.includes(targetChu)) { currentChuBlock = targetChu; continue; }
            else { currentChuBlock = ""; }
        }
        if (currentChuBlock === targetChu && row.startsWith(targetGap)) {
            let textHau = db[i].split(":")[1] || "";
            let vế = textHau.split("|");
            if (vế.length >= 2) return gapNamBenPhai ? vế[1].trim() : vế[0].trim();
            else return vế[0].trim();
        }
    }
    return null;
}

function thucHienTruyVan() {
    // Correct tất cả 4 form trước khi tra
    correctField('f1', null);
    correctField('f2', 'f1');
    correctField('f3', null);
    correctField('f4', 'f3');

    const la = [
        document.getElementById('f1').value.trim(),
        document.getElementById('f2').value.trim(),
        document.getElementById('f3').value.trim(),
        document.getElementById('f4').value.trim()
    ];

    let ketQua = [];
    for (let i = 0; i < 3; i++) {
        let A = la[i], B = la[i+1];
        if (!A || !B) continue;
        let result = "";
        if (A.toUpperCase().includes("Đ") && B.toUpperCase().includes("N")) {
            result = findData05(A, B, true);
        } else if (B.toUpperCase().includes("Đ") && A.toUpperCase().includes("N")) {
            result = findData05(B, A, false);
        }
        if (result) {
            ketQua.push(`Cặp ${i+1}  (${A} — ${B})\n➤ ${result}`);
        } else {
            ketQua.push(`Cặp ${i+1}  (${A} — ${B})\n⚠ Không tìm thấy — kiểm tra lại định dạng`);
        }
    }
    document.getElementById('output').innerText = ketQua.join("\n\n────────────────────\n\n");
}

function copyKetQua() {
    const text = document.getElementById('output').innerText;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
        alert("✔ Đã sao chép!");
    }).catch(() => {
        const t = document.createElement('textarea');
        t.value = text;
        document.body.appendChild(t);
        t.select();
        document.execCommand('copy');
        document.body.removeChild(t);
        alert("✔ Đã sao chép!");
    });
}
