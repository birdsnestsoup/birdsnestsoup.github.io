<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STM - Lập Quẻ Dịch Tân Thời</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Be+Vietnam+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --ink: #1a1a2e;
            --cinnabar: #c0392b;
            --gold: #c9973a;
            --gold-light: #e8c96a;
            --parchment: #f5f0e8;
            --parchment-dark: #ede5d0;
            --mist: #8c8070;
            --jade: #2e7d5e;
            --jade-light: #3da876;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--parchment);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 15px 60px;
            position: relative; overflow-x: hidden;
        }

        /* Texture nền */
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image:
                radial-gradient(ellipse at 15% 10%, rgba(201,151,58,0.10) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 85%, rgba(46,125,94,0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(192,57,43,0.03) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: ''; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0; opacity: 0.5;
        }

        .content-wrap {
            position: relative; z-index: 1;
            width: 100%; max-width: 480px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* HEADER */
        .header { text-align: center; margin-bottom: 28px; padding-top: 12px; }
        .header-badge {
            display: inline-block; font-size: 0.62rem; letter-spacing: 0.28em;
            font-weight: 700; color: var(--gold); text-transform: uppercase;
            border: 1px solid var(--gold); padding: 3px 14px; border-radius: 2px;
            margin-bottom: 12px;
        }
        .header h1 {
            font-family: 'Noto Serif', serif;
            font-size: 1.65rem; color: var(--ink); line-height: 1.3; margin-bottom: 5px;
        }
        .header h1 span { color: var(--cinnabar); }
        .header p { font-size: 0.72rem; color: var(--mist); letter-spacing: 0.06em; }

        /* INPUT */
        .input-wrap { width: 100%; margin-bottom: 14px; }
        .input-wrap label {
            display: block; font-size: 0.68rem; font-weight: 700;
            letter-spacing: 0.14em; color: var(--mist); text-transform: uppercase; margin-bottom: 7px;
        }
        .input-wrap input {
            width: 100%; padding: 14px 16px;
            border: 1.5px solid var(--parchment-dark); border-radius: 8px;
            background: white; font-family: 'Be Vietnam Pro', sans-serif;
            font-size: 0.95rem; color: var(--ink); outline: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: border-color 0.2s;
        }
        .input-wrap input:focus { border-color: var(--gold); }

        /* NÚT CHÍNH */
        .main-btn {
            width: 100%; padding: 17px;
            background: var(--ink); color: var(--parchment);
            border: none; border-radius: 10px;
            font-weight: 700; font-size: 0.95rem; letter-spacing: 0.08em;
            cursor: pointer; margin-bottom: 12px;
            box-shadow: 0 4px 18px rgba(26,26,46,0.22);
            transition: opacity 0.2s, transform 0.1s;
            position: relative; overflow: hidden;
        }
        .main-btn:active { transform: scale(0.98); }
        .main-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .main-btn .btn-inner { display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* Spinner vòng tròn nhỏ */
        .spinner {
            display: none; width: 16px; height: 16px;
            border: 2px solid rgba(245,240,232,0.3);
            border-top-color: var(--parchment);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ACTION ROW */
        .action-row { width: 100%; display: flex; gap: 8px; margin-bottom: 22px; }
        .download-btn {
            flex: 1; padding: 11px; background: var(--jade); color: white;
            border: none; border-radius: 8px; font-weight: 600; font-size: 0.83rem;
            cursor: pointer; display: none;
            transition: background 0.2s;
        }
        .download-btn:hover { background: var(--jade-light); }
        .ai-btn {
            flex: 1; padding: 11px; border: none; border-radius: 8px; color: white;
            font-weight: 600; font-size: 0.83rem; text-decoration: none;
            text-align: center; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.2s;
        }
        .ai-btn:hover { opacity: 0.85; }
        .btn-gemini { background: #4285f4; }
        .btn-chatgpt { background: #10a37f; }

        /* =================== CAPTURE AREA =================== */
        #capture-area {
            width: 100%; display: none;
            flex-direction: column; gap: 14px;
            padding: 10px; border-radius: 12px;
        }

        .summary-card, .card, .haodong-card {
            background-color: #ffffff !important;
            border-radius: 12px; padding: 16px 18px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.07);
            opacity: 1 !important;
        }
        .summary-card { border-left: 4px solid var(--cinnabar); }
        .haodong-card  { border-left: 4px solid var(--gold); }

        .card-label {
            font-size: 0.63rem; font-weight: 700; letter-spacing: 0.15em;
            color: var(--mist); text-transform: uppercase; margin-bottom: 6px;
        }
        .q-text {
            font-family: 'Noto Serif', serif; font-style: italic;
            font-size: 0.95rem; color: var(--ink); margin-bottom: 10px;
            padding-bottom: 10px; border-bottom: 1px dashed var(--parchment-dark); line-height: 1.6;
        }
        .meta-row { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 6px; }
        .moving-info { font-size: 0.85rem; color: var(--ink); }
        .moving-info span { color: var(--cinnabar); font-weight: 700; }
        .timestamp { font-size: 0.68rem; color: var(--mist); }

        /* Hai quẻ song song */
        .que-display { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card.chinh { border-top: 3px solid var(--gold); }
        .card.bien  { border-top: 3px solid var(--cinnabar); }
        .card.tinh-only { border-top: 3px solid var(--jade); }

        /* Tên quẻ */
        .que-name {
            font-family: 'Noto Serif', serif; font-size: 0.95rem; font-weight: 700;
            color: var(--ink); min-height: 2.8em;
            display: flex; align-items: center; justify-content: center;
            text-align: center; line-height: 1.4; margin-bottom: 2px;
        }

        /* Tên quái đơn + ký hiệu */
        .trigram-row {
            display: flex; justify-content: space-around; align-items: center;
            margin-bottom: 4px; margin-top: 4px;
            font-size: 0.7rem; color: var(--mist);
            gap: 4px;
        }
        .trigram-item { text-align: center; line-height: 1.4; }
        .trigram-symbol { font-size: 1.1rem; color: var(--ink); display: block; }
        .trigram-name { font-size: 0.6rem; color: var(--mist); letter-spacing: 0.05em; }

        /* HÀO HEXAGRAM */
        .hexagram { display: flex; flex-direction: column; gap: 6px; align-items: center; margin: 10px 0 8px; }
        .line-wrap {
            display: flex; align-items: center; gap: 5px;
            width: 100%; justify-content: center;
            opacity: 0; transform: translateY(6px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .line-wrap.revealed { opacity: 1; transform: translateY(0); }
        .line-wrap .hao-lines { width: 72px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .line-num { font-size: 0.58rem; color: var(--mist); width: 12px; text-align: right; }
        .line { height: 9px; border-radius: 2px; background-color: var(--ink); }
        .line.yang { width: 72px; }
        .line.yin-left, .line.yin-right { width: 30px; }
        .line.moving-yang, .line.moving-yin { background-color: var(--cinnabar); }

        /* Loại hào nhỏ (6/7/8/9) */
        .hao-type-dot {
            font-size: 0.55rem; color: var(--mist); width: 10px; text-align: left;
            font-weight: 700;
        }
        .hao-type-dot.dong { color: var(--cinnabar); }

        .bin-info {
            font-family: monospace; font-size: 0.72rem; color: var(--mist);
            background: var(--parchment); padding: 3px 8px; border-radius: 4px;
            display: inline-block; letter-spacing: 0.1em;
        }

        /* Hào động pills */
        .haodong-pills { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
        .pill {
            background: var(--parchment); border: 1px solid var(--parchment-dark);
            border-radius: 20px; padding: 4px 12px;
            font-size: 0.78rem; color: var(--ink);
        }
        .pill.active {
            background: var(--cinnabar); border-color: var(--cinnabar);
            color: white; font-weight: 600;
        }
        .tinh-badge {
            background: var(--jade); color: white;
            padding: 5px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
        }
        .dong-count-badge {
            background: var(--parchment-dark); color: var(--mist);
            padding: 4px 10px; border-radius: 20px; font-size: 0.7rem;
            margin-left: auto;
        }

        /* Info quẻ tĩnh */
        .bien-tinh-note {
            font-size: 0.72rem; color: var(--mist); font-style: italic;
            text-align: center; padding: 8px 0 2px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }

        /* FOOTER */
        .footer { text-align: center; font-size: 0.6rem; color: var(--mist); margin-top: 8px; }
        .divider { width: 60px; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); margin: 4px auto 10px; }
        .seed-info { font-size: 0.6rem; color: #ccc; margin-top: 4px; font-family: monospace; }

        /* Kết quả fade in */
        #capture-area {
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<script>
// ============================================================
//  DỮ LIỆU
// ============================================================

// 64 quẻ - key: thuongQuai(3bit) + haQuai(3bit)
const data64Que = {
    "111111":"Thuần Càn","000000":"Thuần Khôn",
    "010001":"Thủy Lôi Truân","100010":"Sơn Thủy Mông",
    "010111":"Thủy Thiên Nhu","111010":"Thiên Thủy Tụng",
    "000010":"Địa Thủy Sư","010000":"Thủy Địa Tỷ",
    "110111":"Phong Thiên Tiểu Súc","111011":"Thiên Trạch Lý",
    "000111":"Địa Thiên Thái","111000":"Thiên Địa Bĩ",
    "111101":"Thiên Hỏa Đồng Nhân","101111":"Hỏa Thiên Đại Hữu",
    "000100":"Địa Sơn Khiêm","001000":"Lôi Địa Dự",
    "011001":"Trạch Lôi Tùy","100110":"Sơn Phong Cổ",
    "000011":"Địa Trạch Lâm","110000":"Phong Địa Quán",
    "101001":"Hỏa Lôi Phệ Hạp","100101":"Sơn Hỏa Bí",
    "100000":"Sơn Địa Bác","000001":"Địa Lôi Phục",
    "111001":"Thiên Lôi Vô Vọng","100111":"Sơn Thiên Đại Súc",
    "100001":"Sơn Lôi Di","011110":"Trạch Phong Đại Quá",
    "010010":"Thuần Khảm","101101":"Thuần Ly",
    "011100":"Trạch Sơn Hàm","001110":"Lôi Phong Hằng",
    "111100":"Thiên Sơn Độn","001111":"Lôi Thiên Đại Tráng",
    "101000":"Hỏa Địa Tấn","000101":"Địa Hỏa Minh Di",
    "110101":"Phong Hỏa Gia Nhân","101011":"Hỏa Trạch Khuê",
    "010100":"Thủy Sơn Kiển","001010":"Lôi Thủy Giải",
    "100011":"Sơn Trạch Tổn","110001":"Phong Lôi Ích",
    "011111":"Trạch Thiên Quải","111110":"Thiên Phong Cấu",
    "011000":"Trạch Địa Tụy","000110":"Địa Phong Thăng",
    "011010":"Trạch Thủy Khốn","010110":"Thủy Phong Tỉnh",
    "011101":"Trạch Hỏa Cách","101110":"Hỏa Phong Đỉnh",
    "001001":"Thuần Chấn","100100":"Thuần Cấn",
    "110100":"Phong Sơn Tiệm","001011":"Lôi Trạch Quy Muội",
    "001101":"Lôi Hỏa Phong","101100":"Hỏa Sơn Lữ",
    "110110":"Thuần Tốn","011011":"Thuần Đoài",
    "110010":"Phong Thủy Hoán","010011":"Thủy Trạch Tiết",
    "110011":"Phong Trạch Trung Phu","001100":"Lôi Sơn Tiểu Quá",
    "010101":"Thủy Hỏa Ký Tế","101010":"Hỏa Thủy Vị Tế"
};

// Quái đơn: mã 3-bit → tên + ký hiệu
const TRIGRAM = {
    "111": { name: "Càn",  sym: "☰" },
    "011": { name: "Đoài", sym: "☱" },
    "101": { name: "Ly",   sym: "☲" },
    "001": { name: "Chấn", sym: "☳" },
    "110": { name: "Tốn",  sym: "☴" },
    "010": { name: "Khảm", sym: "☵" },
    "100": { name: "Cấn",  sym: "☶" },
    "000": { name: "Khôn", sym: "☷" }
};

// ============================================================
//  THUẬT TOÁN HẠT NHÂN
// ============================================================

/** Hash djb2 cho chuỗi */
function hashStr(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) {
        h = ((h << 5) + h) ^ str.charCodeAt(i);
        h = h >>> 0;
    }
    return h;
}

/** Xây seed từ thời gian + câu hỏi */
function buildSeed(question) {
    const now = Date.now();
    const qHash = question.trim().length > 0 ? hashStr(question.trim()) : 0;
    let seed = (now ^ qHash) >>> 0;
    // Wang hash để trộn bits tốt hơn
    seed ^= (seed >>> 16);
    seed  = Math.imul(seed,  0x45d9f3b) >>> 0;
    seed ^= (seed >>> 16);
    seed  = Math.imul(seed,  0x45d9f3b) >>> 0;
    seed ^= (seed >>> 16);
    return seed >>> 0;
}

/** LCG RNG - đơn giản, đủ nhanh */
function makeRng(seed) {
    let s = seed >>> 0;
    return function() {
        s = (Math.imul(1664525, s) + 1013904223) >>> 0;
        return s / 4294967296;
    };
}

/**
 * Gieo một hào theo phương pháp 3 đồng tiền (cổ pháp).
 * Mỗi đồng: ngửa (2) / sấp (3) — tổng 3 đồng → 6,7,8,9
 *   6 = âm động  (0 dong)
 *   7 = dương tĩnh(1 tinh)
 *   8 = âm tĩnh  (0 tinh)
 *   9 = dương động(1 dong)
 *
 * Xác suất đúng cổ pháp:
 *   6 = 1/8 (SSS)
 *   7 = 3/8 (NNN,NNS,NSN,SNN... wait: N=2,S=3)
 *   Thực: 6=SSS(1), 7=NSS+SNS+SSN(3), 8=NNS+NSN+SNN(3), 9=NNN(1)
 *   => 6: 1/8, 7: 3/8, 8: 3/8, 9: 1/8
 */
function rollHao(rng) {
    // Tung 3 đồng: sấp=3, ngửa=2
    const c1 = rng() < 0.5 ? 2 : 3;
    const c2 = rng() < 0.5 ? 2 : 3;
    const c3 = rng() < 0.5 ? 2 : 3;
    const total = c1 + c2 + c3; // 6,7,8,9
    return {
        type: total,            // 6/7/8/9
        bin:  (total % 2 !== 0) ? '1' : '0', // 7,9 → dương; 6,8 → âm
        dong: total === 6 || total === 9
    };
}

/**
 * Tính quẻ biến từ binChinh + haos đã reverse
 * (haos[0] = hào 1 (dưới), haos[5] = hào 6 (trên))
 * binChinh = thuongQuai(3bit) + haQuai(3bit)
 *   → bit index 0..2 = thuong, 3..5 = ha
 *   → bit[idx] tương ứng hào (5-idx)+1
 */
function tinhBinBien(binChinh, haos) {
    // binChinh[0] = hào 6, binChinh[5] = hào 1
    return binChinh.split('').map((bit, idx) => {
        const haoIndex = 5 - idx;  // chuyển vị trí bit → index trong haos[]
        return haos[haoIndex].dong ? (bit === '1' ? '0' : '1') : bit;
    }).join('');
}

// ============================================================
//  MAIN: LẬP QUẺ
// ============================================================
async function lapQueSTM() {
    const btn      = document.getElementById('mainBtn');
    const spinner  = document.getElementById('spinner');
    const btnText  = document.getElementById('btnText');

    // --- Tính toán NGAY (dùng Date.now() chính xác lúc bấm) ---
    const now      = new Date();
    const question = document.getElementById('userQuestion').value;
    const seed     = buildSeed(question);
    const rng      = makeRng(seed);

    // Gieo 6 hào, haos[0] = hào 1 (thấp nhất), haos[5] = hào 6
    const haos = [];
    for (let i = 0; i < 6; i++) haos.push(rollHao(rng));

    // Binary quẻ chính: thuongQuai + haQuai
    // hào 4-5-6 = thượng quái, hào 1-2-3 = hạ quái
    // thuongQuai = haos[5]haos[4]haos[3], haQuai = haos[2]haos[1]haos[0]
    const thuong = haos[5].bin + haos[4].bin + haos[3].bin;
    const ha     = haos[2].bin + haos[1].bin + haos[0].bin;
    const binChinh = thuong + ha;

    // Quẻ biến
    const binBien = tinhBinBien(binChinh, haos);

    // Danh sách hào động (số hào 1-6)
    const dongList = haos
        .map((h, i) => ({ hao: i + 1, dong: h.dong }))
        .filter(x => x.dong)
        .map(x => x.hao);

    const tenChinh = data64Que[binChinh] || "Không xác định";
    const tenBien  = data64Que[binBien]  || "Không xác định";
    const isTinh   = dongList.length === 0;
    const hh = now.getHours().toString().padStart(2,'0');
    const mm = now.getMinutes().toString().padStart(2,'0');
    const ss = now.getSeconds().toString().padStart(2,'0');

    // --- Trạng thái nút: đang cầu quẻ ---
    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.innerText = 'Đang cầu quẻ…';

    // Ẩn kết quả cũ nếu có
    document.getElementById('capture-area').style.display = 'none';
    document.getElementById('btnDownload').style.display  = 'none';

    // --- Delay nghi thức: 1.6 giây ---
    await new Promise(r => setTimeout(r, 1600));

    // --- Điền dữ liệu ---
    document.getElementById('show-question').innerText =
        question.trim() || "Không có câu hỏi cụ thể";
    document.getElementById('name-chinh').innerText = tenChinh;
    document.getElementById('name-bien').innerText  = isTinh ? tenChinh : tenBien;
    document.getElementById('bin-chinh').innerText  =
        `${binChinh.slice(0,3)} ${binChinh.slice(3,6)}`;
    document.getElementById('bin-bien').innerText   =
        `${binBien.slice(0,3)} ${binBien.slice(3,6)}`;
    document.getElementById('moving-res').innerText =
        dongList.length > 0
            ? "Hào " + dongList.slice().sort((a,b)=>a-b).join(", ")
            : "Quẻ Tĩnh";
    document.getElementById('timestamp').innerText =
        `${hh}:${mm}:${ss} · ${now.toLocaleDateString('vi-VN')}`;
    document.getElementById('seed-display').innerText =
        `seed: ${seed.toString(16).toUpperCase()}`;

    // Card quẻ biến: đặc biệt khi tĩnh
    const cardBien = document.getElementById('card-bien');
    const labelBien = cardBien.querySelector('.card-label');
    if (isTinh) {
        cardBien.className = 'card tinh-only';
        labelBien.innerText = 'Quẻ Tĩnh';
    } else {
        cardBien.className = 'card bien';
        labelBien.innerText = 'Quẻ Biến';
    }

    // Ký hiệu quái đơn
    renderTrigrams('trigram-chinh', binChinh);
    renderTrigrams('trigram-bien',  isTinh ? binChinh : binBien);

    // Hiển thị vùng kết quả
    const captureArea = document.getElementById('capture-area');
    captureArea.style.display = 'flex';
    document.getElementById('btnDownload').style.display = 'block';

    // Render hào với animation lần lượt
    await renderHexAnimated('visual-chinh', haos, dongList, true);
    await renderHexAnimated('visual-bien',  haos, dongList, false);
    renderPills(dongList);

    // Ghi chú quẻ tĩnh bên quẻ biến
    const vizBien = document.getElementById('visual-bien');
    if (isTinh) {
        const note = document.createElement('div');
        note.className = 'bien-tinh-note';
        note.innerHTML = '☯ Quẻ tĩnh — không có quẻ biến';
        vizBien.after(note);
    } else {
        const old = vizBien.parentNode.querySelector('.bien-tinh-note');
        if (old) old.remove();
    }

    // Khôi phục nút
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.innerText = '☯ CHẠM LẬP QUẺ & PHÂN TÍCH';
}

// ============================================================
//  RENDER
// ============================================================

/** Render ký hiệu quái đơn (thượng + hạ) */
function renderTrigrams(containerId, bin6) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    const thuong = TRIGRAM[bin6.slice(0,3)];
    const ha     = TRIGRAM[bin6.slice(3,6)];
    [ha, thuong].forEach((tg, idx) => {
        if (!tg) return;
        const el = document.createElement('div');
        el.className = 'trigram-item';
        el.innerHTML = `<span class="trigram-symbol">${tg.sym}</span><span class="trigram-name">${idx === 0 ? 'Hạ: ' : 'Thượng: '}${tg.name}</span>`;
        container.appendChild(el);
    });
}

/**
 * Render hexagram với animation từ hào 1 (dưới) lên hào 6.
 * Trong DOM, hào 6 ở trên cùng → vẽ từ hào 1 lên hào 6 = từ dưới lên trên.
 */
async function renderHexAnimated(containerId, haos, dongList, isMain) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';

    // Xây DOM tất cả hào từ hào 6 xuống 1 (hiển thị trên xuống dưới)
    const wraps = [];
    for (let i = 5; i >= 0; i--) {
        const haoNum = i + 1;
        const hao    = haos[i];

        // Xác định âm/dương
        let isYang;
        if (isMain) {
            isYang = hao.bin === '1';
        } else {
            // Quẻ biến: hào động thì đảo, hào tĩnh giữ nguyên
            isYang = hao.dong ? hao.bin !== '1' : hao.bin === '1';
        }

        const isDong = dongList.includes(haoNum) && isMain;

        // Nhãn loại hào (6/7/8/9) — chỉ quẻ chính
        const typeLabel = isMain ? String(hao.type) : '';

        const wrap = document.createElement('div');
        wrap.className = 'line-wrap'; // chưa 'revealed'

        // Số hào
        const numEl = document.createElement('span');
        numEl.className = 'line-num';
        numEl.innerText = haoNum;
        wrap.appendChild(numEl);

        // Đường hào
        const linesBox = document.createElement('div');
        linesBox.className = 'hao-lines';
        if (isYang) {
            const l = document.createElement('div');
            l.className = 'line yang' + (isDong ? ' moving-yang' : '');
            linesBox.appendChild(l);
        } else {
            const l1 = document.createElement('div');
            l1.className = 'line yin-left' + (isDong ? ' moving-yin' : '');
            const l2 = document.createElement('div');
            l2.className = 'line yin-right' + (isDong ? ' moving-yin' : '');
            linesBox.appendChild(l1);
            linesBox.appendChild(l2);
        }
        wrap.appendChild(linesBox);

        // Nhãn 6/7/8/9 bên phải (chỉ quẻ chính)
        if (isMain) {
            const typeDot = document.createElement('span');
            typeDot.className = 'hao-type-dot' + (isDong ? ' dong' : '');
            typeDot.innerText = typeLabel;
            wrap.appendChild(typeDot);
        }

        container.appendChild(wrap);
        wraps.push({ wrap, haoNum });
    }

    // Animation: reveal từ hào 1 → hào 6
    // wraps[0]=hào6(trên) … wraps[5]=hào1(dưới) trong DOM
    // Muốn reveal thứ tự hào 1→6 = wraps[5]→wraps[0]
    const ordered = wraps.slice().reverse(); // ordered[0]=hào1, ordered[5]=hào6
    for (const { wrap } of ordered) {
        await new Promise(r => setTimeout(r, 110));
        wrap.classList.add('revealed');
    }
}

/** Render pills hào động */
function renderPills(dongList) {
    const wrap = document.getElementById('haodong-pills');
    wrap.innerHTML = '';

    if (dongList.length === 0) {
        const b = document.createElement('span');
        b.className = 'tinh-badge';
        b.innerText = '☯ Quẻ Tĩnh — Nội quái bền vững';
        wrap.appendChild(b);
        return;
    }

    for (let i = 1; i <= 6; i++) {
        const isDong = dongList.includes(i);
        const p = document.createElement('span');
        p.className = 'pill' + (isDong ? ' active' : '');
        p.innerText = `Hào ${i}${isDong ? ' ●' : ''}`;
        wrap.appendChild(p);
    }

    const badge = document.createElement('span');
    badge.className = 'dong-count-badge';
    badge.innerText = `${dongList.length}/6 động`;
    wrap.appendChild(badge);
}

// ============================================================
//  TẢI ẢNH — GIỮ NGUYÊN PHƯƠNG PHÁP RÕ NÉT
// ============================================================
function downloadImg() {
    const area = document.getElementById('capture-area');

    // Đảm bảo tất cả hào đã hiển thị trước khi chụp
    area.querySelectorAll('.line-wrap').forEach(el => {
        el.style.opacity = '1';
        el.style.transform = 'none';
    });

    const tempStyle = document.createElement('style');
    tempStyle.innerHTML = `
        #capture-area {
            background-color: #f5f0e8 !important;
            padding: 20px !important;
            animation: none !important;
        }
        .summary-card, .card, .haodong-card {
            box-shadow: none !important;
            border: 1px solid #ede5d0 !important;
            background-color: #ffffff !important;
        }
        .line-wrap {
            opacity: 1 !important;
            transform: none !important;
            transition: none !important;
        }
    `;
    document.head.appendChild(tempStyle);

    html2canvas(area, {
        backgroundColor: "#f5f0e8",
        scale: 3,
        useCORS: true,
        logging: false,
        onclone: (clonedDoc) => {
            const ca = clonedDoc.getElementById('capture-area');
            ca.style.display = 'flex';
            ca.style.animation = 'none';
            // Force tất cả hào về visible trong clone
            ca.querySelectorAll('.line-wrap').forEach(el => {
                el.style.opacity = '1';
                el.style.transform = 'none';
                el.style.transition = 'none';
            });
        }
    }).then(canvas => {
        document.head.removeChild(tempStyle);
        const link = document.createElement('a');
        link.download = 'QueDich_STM_' + new Date().getTime() + '.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    });
}
