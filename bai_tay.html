<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bói Bài Tây – Huyền Số</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English+SC&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c8a94a;
  --gold-light: #e8d08a;
  --gold-dark: #8b6914;
  --deep: #0a0612;
  --deep2: #120920;
  --purple: #1e0a3c;
  --purple2: #2d1260;
  --crimson: #7a1020;
  --text: #e8dcc8;
  --text2: #b8a888;
  --card-back: #1a0a30;
  --shadow: rgba(200,169,74,0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--deep);
  color: var(--text);
  font-family: 'Lora', Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: default;
}

/* STARFIELD */
body::before {
  content:'';
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(46,18,96,0.7) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 100%, rgba(122,16,32,0.3) 0%, transparent 60%);
}

.stars {
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.8), transparent),
    radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1.5px 1.5px at 55% 15%, rgba(200,169,74,0.9), transparent),
    radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.6), transparent),
    radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.7), transparent),
    radial-gradient(1px 1px at 15% 75%, rgba(200,169,74,0.6), transparent),
    radial-gradient(1px 1px at 45% 90%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1.5px 1.5px at 90% 10%, rgba(255,255,255,0.9), transparent),
    radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 65% 55%, rgba(200,169,74,0.7), transparent),
    radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.6), transparent),
    radial-gradient(1px 1px at 95% 65%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 38% 28%, rgba(255,255,255,0.7), transparent),
    radial-gradient(1px 1px at 77% 48%, rgba(200,169,74,0.5), transparent),
    radial-gradient(1.5px 1.5px at 50% 70%, rgba(255,255,255,0.8), transparent);
  animation: twinkle 6s infinite alternate;
}
@keyframes twinkle {
  0%{opacity:.7} 50%{opacity:1} 100%{opacity:.5}
}

/* LAYOUT */
.app { position:relative; z-index:1; max-width:960px; margin:0 auto; padding:0 16px 60px; }

/* HEADER */
header {
  text-align:center; padding:40px 16px 20px;
  border-bottom:1px solid rgba(200,169,74,0.2);
}
.title-deco { color:var(--gold); font-size:11px; letter-spacing:6px; text-transform:uppercase; opacity:.7; margin-bottom:8px; }
h1 {
  font-family:'Cinzel Decorative', serif;
  font-size: clamp(22px, 5vw, 42px);
  color: var(--gold);
  text-shadow: 0 0 40px rgba(200,169,74,0.5), 0 2px 4px #000;
  line-height:1.2; margin-bottom:6px;
}
.subtitle { font-family:'IM Fell English SC'; color:var(--text2); font-size:14px; letter-spacing:2px; }

/* ORB */
.orb-wrap { display:flex; justify-content:center; margin:24px 0 16px; }
.orb {
  width:80px; height:80px; border-radius:50%;
  background: radial-gradient(circle at 35% 35%, rgba(200,169,74,0.4) 0%, rgba(46,18,96,0.8) 50%, rgba(10,6,18,1) 100%);
  border:2px solid rgba(200,169,74,0.4);
  box-shadow:0 0 30px rgba(200,169,74,0.3), inset 0 0 20px rgba(200,169,74,0.1);
  animation: pulse-orb 3s ease-in-out infinite;
  cursor:pointer; position:relative; overflow:hidden;
}
.orb::after {
  content:'✦'; position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  color:var(--gold); font-size:28px;
  animation: rotate-star 8s linear infinite;
}
@keyframes pulse-orb { 0%,100%{box-shadow:0 0 30px rgba(200,169,74,0.3), inset 0 0 20px rgba(200,169,74,0.1)} 50%{box-shadow:0 0 50px rgba(200,169,74,0.5), inset 0 0 30px rgba(200,169,74,0.2)} }
@keyframes rotate-star { from{transform:translate(-50%,-50%) rotate(0deg)} to{transform:translate(-50%,-50%) rotate(360deg)} }

/* SECTIONS */
section { margin-top:28px; }
.section-title {
  font-family:'Cinzel Decorative'; font-size:12px;
  color:var(--gold); letter-spacing:4px; text-transform:uppercase;
  text-align:center; margin-bottom:16px; opacity:.85;
}
.section-title span { display:inline-block; padding:0 12px; position:relative; }
.section-title span::before, .section-title span::after {
  content:''; display:inline-block; width:40px; height:1px;
  background:linear-gradient(to right,transparent,var(--gold-dark)); vertical-align:middle; margin:0 10px;
}
.section-title span::after { background:linear-gradient(to left,transparent,var(--gold-dark)); }

/* TOPIC GRID */
.topic-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; }
.topic-btn {
  background: linear-gradient(135deg, rgba(30,10,60,0.8), rgba(10,6,18,0.9));
  border:1px solid rgba(200,169,74,0.25);
  border-radius:8px; padding:12px 10px;
  color:var(--text2); font-family:'Lora'; font-size:12px;
  cursor:pointer; transition:all .25s; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:6px;
}
.topic-btn:hover, .topic-btn.active {
  border-color:var(--gold); color:var(--gold);
  background:linear-gradient(135deg, rgba(46,18,96,0.9), rgba(30,10,60,0.95));
  box-shadow:0 0 16px rgba(200,169,74,0.2);
  transform:translateY(-2px);
}
.topic-icon { font-size:22px; }

/* QUESTION INPUT */
.question-wrap { margin-top:16px; }
.question-wrap textarea {
  width:100%; background:rgba(10,6,18,0.8);
  border:1px solid rgba(200,169,74,0.2); border-radius:8px;
  color:var(--text); font-family:'Lora'; font-size:13px;
  padding:12px 14px; resize:vertical; min-height:70px;
  outline:none; transition:border .2s;
}
.question-wrap textarea:focus { border-color:rgba(200,169,74,0.5); }
.question-wrap textarea::placeholder { color:rgba(184,168,136,0.4); font-style:italic; }

/* SPREAD SELECTOR */
.spread-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; margin-top:8px; }
.spread-btn {
  background:rgba(10,6,18,0.8); border:1px solid rgba(200,169,74,0.2);
  border-radius:8px; padding:12px; cursor:pointer; transition:all .25s;
  text-align:left;
}
.spread-btn:hover, .spread-btn.active {
  border-color:var(--gold); background:rgba(30,10,60,0.9);
  box-shadow:0 0 12px rgba(200,169,74,0.15);
}
.spread-name { font-family:'IM Fell English SC'; color:var(--gold); font-size:13px; margin-bottom:3px; }
.spread-desc { color:var(--text2); font-size:11px; line-height:1.5; }

/* DRAW BTN */
.draw-wrap { display:flex; justify-content:center; margin-top:24px; }
.draw-btn {
  font-family:'Cinzel Decorative'; font-size:13px; letter-spacing:2px;
  color:var(--deep); background:linear-gradient(135deg, var(--gold), var(--gold-dark));
  border:none; border-radius:50px; padding:14px 40px;
  cursor:pointer; transition:all .3s;
  box-shadow:0 4px 20px rgba(200,169,74,0.4);
}
.draw-btn:hover {
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(200,169,74,0.5);
}
.draw-btn:active { transform:translateY(0); }

/* READING AREA */
#reading-area { margin-top:32px; }

/* CARD DISPLAY */
.cards-row {
  display:flex; flex-wrap:wrap; gap:12px;
  justify-content:center; margin:20px 0;
}
.card-slot {
  display:flex; flex-direction:column; align-items:center; gap:6px;
}
.pos-label { font-size:10px; color:var(--gold); letter-spacing:2px; text-transform:uppercase; font-family:'IM Fell English SC'; }
.card {
  width:72px; height:108px; border-radius:8px;
  position:relative; cursor:pointer;
  transform-style:preserve-3d; transition:transform .6s;
  perspective:600px;
}
.card.flipped .card-inner { transform:rotateY(180deg); }
.card-inner { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform .6s; }
.card-front, .card-back {
  position:absolute; inset:0; border-radius:8px;
  backface-visibility:hidden;
}
.card-back {
  background:linear-gradient(135deg, var(--card-back), var(--purple2));
  border:2px solid rgba(200,169,74,0.4);
  display:flex; align-items:center; justify-content:center;
  font-size:24px; color:rgba(200,169,74,0.3);
}
.card-back::after {
  content:''; position:absolute; inset:4px;
  border:1px solid rgba(200,169,74,0.15);
  border-radius:4px;
}
.card-front {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transform:rotateY(180deg);
  font-size:11px; font-family:'IM Fell English SC'; letter-spacing:.5px;
  padding:4px; text-align:center;
  border:2px solid;
}
.card-front.hearts  { background:#1a0005; border-color:#cc3344; color:#ff6677; }
.card-front.diamonds{ background:#1a0a00; border-color:#cc6622; color:#ff8844; }
.card-front.clubs   { background:#001a08; border-color:#228866; color:#44cc88; }
.card-front.spades  { background:#00081a; border-color:#3366cc; color:#6699ff; }

.card-suit-big { font-size:28px; line-height:1; }
.card-name-text { font-size:9px; margin-top:4px; opacity:.9; }

/* RESULT BOX */
.result-box {
  background:linear-gradient(180deg, rgba(10,6,18,0.95), rgba(30,10,60,0.9));
  border:1px solid rgba(200,169,74,0.3); border-radius:12px;
  padding:24px; margin-top:16px;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
}
.result-topic { font-family:'Cinzel Decorative'; font-size:11px; color:var(--gold); letter-spacing:3px; margin-bottom:16px; }
.result-overall { font-size:15px; line-height:1.9; color:var(--text); margin-bottom:16px; font-style:italic; }
.card-meaning-list { list-style:none; padding:0; }
.card-meaning-item {
  padding:10px 0; border-bottom:1px solid rgba(200,169,74,0.1);
  display:flex; gap:12px; align-items:flex-start;
}
.card-meaning-item:last-child { border-bottom:none; }
.card-badge {
  min-width:44px; height:28px; border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; font-family:'IM Fell English SC';
}
.card-badge.hearts  { background:rgba(204,51,68,0.2); border:1px solid #cc3344; }
.card-badge.diamonds{ background:rgba(204,102,34,0.2); border:1px solid #cc6622; }
.card-badge.clubs   { background:rgba(34,136,102,0.2); border:1px solid #228866; }
.card-badge.spades  { background:rgba(51,102,204,0.2); border:1px solid #3366cc; }
.card-meaning-text { font-size:12.5px; color:var(--text2); line-height:1.7; }
.card-meaning-name { color:var(--gold); font-family:'IM Fell English SC'; margin-right:6px; }

.combo-section { margin-top:16px; padding-top:16px; border-top:1px solid rgba(200,169,74,0.15); }
.combo-title { font-family:'IM Fell English SC'; color:var(--gold-light); font-size:13px; letter-spacing:1px; margin-bottom:10px; }
.combo-item {
  background:rgba(200,169,74,0.05); border:1px solid rgba(200,169,74,0.1);
  border-radius:6px; padding:10px 12px; margin-bottom:8px;
  font-size:12.5px; color:var(--text2); line-height:1.7;
}
.combo-cards { color:var(--gold); font-family:'IM Fell English SC'; font-size:12px; margin-bottom:4px; }

.final-verdict {
  margin-top:16px; padding:16px;
  background:linear-gradient(135deg, rgba(46,18,96,0.4), rgba(122,16,32,0.2));
  border:1px solid rgba(200,169,74,0.25); border-radius:8px;
}
.verdict-label { font-family:'IM Fell English SC'; color:var(--gold); font-size:12px; letter-spacing:2px; margin-bottom:8px; }
.verdict-text { font-size:13px; color:var(--text); line-height:1.8; }

/* COPY BTN */
.copy-wrap { display:flex; justify-content:center; margin-top:20px; gap:12px; flex-wrap:wrap; }
.copy-btn {
  font-family:'Cinzel Decorative'; font-size:11px; letter-spacing:1px;
  background:rgba(200,169,74,0.1); border:1px solid rgba(200,169,74,0.4);
  color:var(--gold); border-radius:50px; padding:10px 28px;
  cursor:pointer; transition:all .25s;
}
.copy-btn:hover { background:rgba(200,169,74,0.2); box-shadow:0 0 16px rgba(200,169,74,0.2); }
.new-btn {
  font-family:'Cinzel Decorative'; font-size:11px; letter-spacing:1px;
  background:rgba(122,16,32,0.2); border:1px solid rgba(200,169,74,0.3);
  color:var(--text2); border-radius:50px; padding:10px 28px;
  cursor:pointer; transition:all .25s;
}
.new-btn:hover { background:rgba(122,16,32,0.3); color:var(--gold); }

/* TOAST */
.toast {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
  background:var(--gold); color:var(--deep); font-family:'IM Fell English SC';
  padding:10px 24px; border-radius:50px; font-size:13px;
  opacity:0; transition:opacity .3s; pointer-events:none; z-index:999;
  white-space:nowrap;
}
.toast.show { opacity:1; }

/* DIVIDER */
.divider {
  display:flex; align-items:center; gap:12px;
  color:rgba(200,169,74,0.3); font-size:18px;
  margin:8px 0;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(200,169,74,0.15);}

/* LOADING */
.loading {
  display:flex; flex-direction:column; align-items:center; gap:12px;
  padding:40px; display:none;
}
.loading.show { display:flex; }
.loading-orb {
  width:50px;height:50px;border-radius:50%;
  border:2px solid transparent;
  border-top-color:var(--gold);
  border-right-color:rgba(200,169,74,0.3);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--text2);font-style:italic;font-size:13px;animation:fade-text 2s ease-in-out infinite}
@keyframes fade-text{0%,100%{opacity:.5}50%{opacity:1}}

/* FOOTER */
footer {
  text-align:center; padding:30px 0 10px;
  color:rgba(200,169,74,0.3); font-size:11px; letter-spacing:2px;
  font-family:'IM Fell English SC';
}

/* RESPONSIVE */
@media(max-width:480px){
  .topic-grid{grid-template-columns:repeat(2,1fr);}
  .spread-grid{grid-template-columns:1fr;}
  .card{width:60px;height:90px;}
  .card-suit-big{font-size:22px;}
}
</style>
</head>
<body>
<div class="stars"></div>

<div class="app">
  <header>
    <div class="title-deco">✦ Huyền Bí Số Mệnh ✦</div>
    <h1>Bói Bài Tây</h1>
    <div class="subtitle">Tiên Tri – Luận Giải – Định Mệnh</div>
    <div class="orb-wrap"><div class="orb"></div></div>
  </header>

  <section>
    <div class="section-title"><span>Chọn Chủ Đề</span></div>
    <div class="topic-grid" id="topicGrid"></div>
  </section>

  <section>
    <div class="section-title"><span>Câu Hỏi Của Bạn</span></div>
    <div class="question-wrap">
      <textarea id="questionInput" placeholder="Gõ câu hỏi cụ thể của bạn vào đây… (không bắt buộc)"></textarea>
    </div>
  </section>

  <section>
    <div class="section-title"><span>Kiểu Trải Bài</span></div>
    <div class="spread-grid" id="spreadGrid"></div>
  </section>

  <div class="draw-wrap">
    <button class="draw-btn" onclick="startReading()">✦ Rút Bài ✦</button>
  </div>

  <div id="reading-area"></div>

  <footer>⬟ Chỉ mang tính giải trí – Vận mệnh do chính bạn tạo nên ⬟</footer>
</div>

<div class="toast" id="toast">Đã sao chép vào bộ nhớ tạm!</div>

<script>
// ===================== DATA =====================
const SUITS = {
  H: { name:'Cơ', symbol:'♥', cls:'hearts', color:'red' },
  D: { name:'Rô', symbol:'♦', cls:'diamonds', color:'orange' },
  C: { name:'Nhép', symbol:'♣', cls:'clubs', color:'green' },
  S: { name:'Bích', symbol:'♠', cls:'spades', color:'blue' }
};

const RANKS = {
  '7':  { name:'Bảy', short:'7' },
  '8':  { name:'Tám', short:'8' },
  '9':  { name:'Chín', short:'9' },
  '10': { name:'Mười', short:'10' },
  'J':  { name:'Bồi', short:'J' },
  'Q':  { name:'Đầm', short:'Q' },
  'K':  { name:'Già', short:'K' },
  'A':  { name:'Ách', short:'A' }
};

// Card meanings (general)
const CARD_MEANINGS = {
  '7H': { core:'Tình cảm bình dị, ước mơ ngây thơ, niềm vui nhỏ', pos:'Hạnh phúc giản dị, tình yêu trong sáng', neg:'Ảo tưởng, thiếu thực tế trong tình cảm' },
  '8H': { core:'Tình cảm ổn định, sự bảo bọc, gia đình yêu thương', pos:'Tình cảm bền vững, mái ấm hạnh phúc', neg:'Sự phụ thuộc, khó thoát khỏi cảm xúc cũ' },
  '9H': { core:'Mong ước thành hiện thực, sự viên mãn, may mắn', pos:'Điều ước trở thành sự thật, thành công mỹ mãn', neg:'Quá hài lòng, không cầu tiến' },
  '10H': { core:'Hạnh phúc trọn vẹn, viên mãn gia đình, đoàn tụ', pos:'Tình yêu thành hôn nhân, gia đình sung mãn', neg:'Phụ thuộc quá nhiều vào cảm xúc' },
  'JH': { core:'Người trẻ nhiệt huyết, sứ giả tốt lành, tin tức vui', pos:'Có người giúp đỡ, tin mừng đến gần', neg:'Người ngây thơ, dễ bị lợi dụng' },
  'QH': { core:'Người phụ nữ hiền lành, bao dung, tinh tế', pos:'Được người tốt hỗ trợ, sự quan tâm chân thành', neg:'Cảm xúc quá mức, hay lo lắng' },
  'KH': { core:'Người đàn ông nhân từ, lãnh đạo bằng trái tim', pos:'Được người có quyền bảo vệ, tình cảm sâu sắc', neg:'Ưu tiên cảm xúc hơn lý trí' },
  'AH': { core:'Tình yêu mãnh liệt, khởi đầu mới về tình cảm, sự thịnh vượng trong nhà', pos:'Tình yêu sâu đậm, hôn nhân hạnh phúc', neg:'Cảm xúc bùng phát, tình cảm không kiểm soát' },

  '7D': { core:'Tiền nhỏ, giao dịch lặt vặt, tin tức về tiền bạc', pos:'Có thu nhập nhỏ, may mắn nho nhỏ về tài chính', neg:'Chỉ thấy lợi ích trước mắt, tham vặt' },
  '8D': { core:'Công việc bận rộn, kỹ năng thực tế, sự cần mẫn', pos:'Chăm chỉ được đền đáp, tiền từ lao động', neg:'Vất vả mà chưa thấy kết quả' },
  '9D': { core:'Độc lập tài chính, thành công từ cố gắng, dư dả', pos:'Tự lực cánh sinh, tài chính ổn định', neg:'Quá tự mãn, ngại chia sẻ' },
  '10D': { core:'Giàu có, thịnh vượng, tiền bạc dồi dào, di sản', pos:'Tài lộc lớn, đầu tư có lời, thành công tài chính', neg:'Ham muốn tiền bạc quá mức' },
  'JD': { core:'Người mang tin tức kinh doanh, cơ hội thương mại', pos:'Tin tốt về tài chính, cơ hội kiếm tiền', neg:'Lời hứa suông, cơ hội không chắc chắn' },

// Build deck
function buildDeck() {
  const deck = [];
  for(const s of Object.keys(SUITS)) for(const r of Object.keys(RANKS)) deck.push(r+s);
  return deck;
}

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// Get combos for drawn cards
function findCombos(cards) {
  const found = [];
  // Check all pairs
  for(let i=0;i<cards.length;i++) for(let j=i+1;j<cards.length;j++){
    const key1 = cards[i]+'+'+cards[j];
    const key2 = cards[j]+'+'+cards[i];
    if(COMBOS[key1]) found.push({cards:[cards[i],cards[j]], meaning:COMBOS[key1]});
    else if(COMBOS[key2]) found.push({cards:[cards[j],cards[i]], meaning:COMBOS[key2]});
  }
  return found;
}

function cardLabel(id) {
  const r = id.slice(0,-1); const s = id.slice(-1);
  return RANKS[r].name + ' ' + SUITS[s].name + ' ' + SUITS[s].symbol;

function cardFrontHTML(id) {
  const r = id.slice(0,-1); const s = id.slice(-1);

}

  else if(dCount>=Math.ceil(cards.length/2)) overall = '🟠 Năng lượng lá Rô chiếm ưu thế – vật chất, tiền bạc và thực tiễn đang là trọng tâm. ';
  else if(cCount>=Math.ceil(cards.length/2)) overall = '🟢 Năng lượng lá Nhép chiếm ưu thế – hành động, nỗ lực và sự nghiệp đang được khuyến khích. ';
  else if(sCount>=Math.ceil(cards.length/2)) overall = '🔵 Năng lượng lá Bích chiếm ưu thế – thử thách, sự thật và biến đổi đang chờ đợi bạn. ';
  else overall = '✦ Các lá bài cân bằng nhiều năng lượng – vận mệnh đang ở giao điểm của nhiều chiều. ';

  // Build positions analysis
  const posTexts = cards.map((c, i) => {
    const pos = spread.positions[i] || `Lá ${i+1}`;
    const m = CARD_MEANINGS[c];
    const topicNote = lens ? lens(c) : m.core;
    return { card:c, pos, core: topicNote, meaning: m };
  });

  // Final verdict based on topic and card energies
  let verdict = '';
  const positiveCards = cards.filter(c => !['9S','10S','AS','QS','JS','8S','7S'].includes(c)).length;
  const ratio = positiveCards/cards.length;

  if(ratio >= 0.7) {
    if(topicInfo.id==='love') verdict = 'Tổng thể luận giải cho thấy tình cảm đang ở giai đoạn rất thuận lợi. Hãy mở lòng đón nhận những điều tốt đẹp – duyên phận đang mỉm cười với bạn.';
    else if(topicInfo.id==='money') verdict = 'Tài vận đang rất sáng. Đây là thời điểm thuận lợi để thực hiện các kế hoạch tài chính – nhưng vẫn cần thận trọng và có chiến lược rõ ràng.';
    else if(topicInfo.id==='career') verdict = 'Sự nghiệp đang trên đà phát triển tốt. Các nỗ lực của bạn sẽ được ghi nhận. Hãy tự tin tiến lên phía trước.';
    else if(topicInfo.id==='health') verdict = 'Sức khoẻ nhìn chung ổn định và tích cực. Duy trì lối sống lành mạnh và giữ vững tinh thần lạc quan.';
    else verdict = 'Các lá bài cho thấy vận khí tổng thể rất khả quan. Tiếp tục giữ vững hướng đi hiện tại, cơ hội và thành công đang ở trước mặt bạn.';
  } else if(ratio >= 0.4) {
    if(topicInfo.id==='danger') verdict = 'Có một số dấu hiệu đáng lo ngại – hãy thận trọng và để ý đến những người xung quanh. Giữ khoảng cách với người có ý xấu và bảo vệ quyền lợi của mình.';
    else verdict = 'Vận khí đang ở giai đoạn trung tính với cả thuận lợi lẫn thử thách. Hãy kiên nhẫn, sáng suốt và không nên đưa ra quyết định quá vội vàng lúc này.';
  } else {
    verdict = 'Các lá bài cảnh báo đây là giai đoạn cần thận trọng. Hãy nhìn nhận lại tình huống một cách khách quan, tránh các rủi ro không cần thiết và chuẩn bị tinh thần cho những thay đổi có thể xảy ra.';
  }

  return { overall, posTexts, combos, verdict };
}

function startReading() {
  if(!selectedTopic) {
    // Pick random topic if none selected
    const t = TOPICS[Math.floor(Math.random()*TOPICS.length)];
    selectedTopic = t;
    document.querySelectorAll('.topic-btn').forEach(b=>{
      if(b.dataset.id===t.id) b.classList.add('active');
    });
  }

  const deck = shuffle(buildDeck());
  drawnCards = deck.slice(0, selectedSpread.count);
  const question = document.getElementById('questionInput').value.trim();

  renderReading(drawnCards, selectedTopic, selectedSpread, question);
}

function renderReading(cards, topic, spread, question) {
  const area = document.getElementById('reading-area');

  // Cards display
  let cardsHTML = '<div class="cards-row">';
  cards.forEach((c,i) => {
    const pos = spread.positions[i]||`Lá ${i+1}`;
    cardsHTML += `
      <div class="card-slot">
        <div class="pos-label">${pos}</div>
        <div class="card" id="card-${i}">
          <div class="card-inner">
            <div class="card-back">✦</div>
            <div class="card-front ${suitCls(c)}">${cardFrontHTML(c)}</div>
          </div>
        </div>
      </div>`;
  });
  cardsHTML += '</div>';

  area.innerHTML = `
    <div class="section-title"><span>${topic.icon} ${topic.name}</span></div>
    ${question?`<div style="text-align:center;color:var(--text2);font-style:italic;font-size:13px;margin-bottom:12px;">"${question}"</div>`:''}
    ${cardsHTML}
    <div class="loading show" id="loadingBox">
      <div class="loading-orb"></div>
      <div class="loading-text">Đang luận giải vận mệnh...</div>
    </div>
    <div id="resultBox" style="display:none;"></div>
  `;

  // Flip cards one by one
  let idx = 0;
  const flipNext = () => {
    if(idx < cards.length) {
      const el = document.getElementById('card-'+idx);
      if(el) el.classList.add('flipped');
      idx++;
      setTimeout(flipNext, 400);
    } else {
      // Show result after all flipped
      setTimeout(() => showResult(cards, topic, spread, question), 600);
    }
  };
  setTimeout(flipNext, 300);
  area.scrollIntoView({ behavior:'smooth', block:'start' });
}

function showResult(cards, topic, spread, question) {
  const loading = document.getElementById('loadingBox');
  const resultBox = document.getElementById('resultBox');
  if(loading) loading.style.display='none';

  const interp = generateInterpretation(cards, topic, spread, question);

  // Card meaning items
  let cardItems = interp.posTexts.map(pt => {
    const m = pt.meaning;
    const suit = pt.card.slice(-1);
    return `
      <li class="card-meaning-item">
        <div class="card-badge ${suitCls(pt.card)}">${SUITS[suit].symbol}</div>
        <div class="card-meaning-text">
          <span class="card-meaning-name">${cardLabel(pt.card)} — ${pt.pos}:</span>
          ${pt.core}. <em style="color:var(--gold-dark)">${m.pos}</em>
          ${m.neg?`<br><span style="color:rgba(200,169,74,0.5);font-size:11px;">⚠ ${m.neg}</span>`:''}
        </div>
      </li>`;
  }).join('');

  // Combo items
  let comboHTML = '';
  if(interp.combos.length > 0) {
    const items = interp.combos.map(co => `
      <div class="combo-item">
        <div class="combo-cards">✦ ${co.cards.map(cardLabel).join(' × ')}</div>
        ${co.meaning}
      </div>`).join('');
    comboHTML = `
      <div class="combo-section">
        <div class="combo-title">🔗 Tổ Hợp Lá Bài Đặc Biệt</div>
        ${items}
      </div>`;
  }

  resultBox.innerHTML = `
    <div class="result-box" id="resultContent">
      <div class="result-topic">✦ Luận Giải – ${topic.name} ✦</div>
      <div class="result-overall">${interp.overall}</div>
      <ul class="card-meaning-list">${cardItems}</ul>
      ${comboHTML}
      <div class="final-verdict">
        <div class="verdict-label">⬟ Tổng Kết Vận Mệnh</div>
        <div class="verdict-text">${interp.verdict}</div>
      </div>
    </div>`;

  resultBox.style.display = 'block';

  // Copy & New buttons
  const copyWrap = document.createElement('div');
  copyWrap.className = 'copy-wrap';
  copyWrap.innerHTML = `
    <button class="copy-btn" onclick="copyResult()">📋 Sao Chép Kết Quả</button>
    <button class="new-btn" onclick="resetReading()">🔄 Rút Bài Mới</button>`;
  resultBox.appendChild(copyWrap);
}

function copyResult() {
  const el = document.getElementById('resultContent');
  if(!el) return;
  const text = el.innerText || el.textContent;
  navigator.clipboard.writeText(text).then(() => showToast('Đã sao chép vào bộ nhớ tạm!')).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Đã sao chép!');
  });
}

function resetReading() {
  document.getElementById('reading-area').innerHTML = '';
  document.getElementById('questionInput').value = '';
  document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('active'));
  selectedTopic = null; drawnCards = [];
  window.scrollTo({top:0,behavior:'smooth'});
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
</script>
