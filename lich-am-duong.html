<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Âm Dương</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:       #1a1a2e;
            --ink-soft:  #4a4a6a;
            --paper:     #fdfaf5;
            --paper-alt: #f5f0e8;
            --gold:      #c9a84c;
            --gold-lt:   #e8d5a0;
            --red:       #c0392b;
            --teal:      #2a7f7f;
            --teal-lt:   #e8f4f4;
            --sunday:    #b03030;
            --saturday:  #2a6060;
            --today-bg:  #fff8e1;
            --today-bd:  #c9a84c;
            --radius:    12px;
            --shadow:    0 4px 24px rgba(26,26,46,0.08);
            --shadow-md: 0 8px 32px rgba(26,26,46,0.12);
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            padding-top: 72px;
        }

        /* ── HEADER ── */
        header {
            position: fixed;
            inset: 0 0 auto 0;
            height: 64px;
            background: var(--ink);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            z-index: 999;
            box-shadow: 0 2px 16px rgba(0,0,0,.25);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: .5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo svg { width:22px; height:22px; flex-shrink:0; }

        .nav-home a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--gold-lt);
            text-decoration: none;
            font-size: .875rem;
            font-weight: 500;
            padding: 6px 14px;
            border: 1px solid rgba(201,168,76,.4);
            border-radius: 20px;
            transition: all .2s;
        }
        .nav-home a:hover { background: rgba(201,168,76,.15); color: var(--gold); }

        /* ── MAIN WRAPPER ── */
        .main {
            max-width: 820px;
            margin: 0 auto;
            padding: 32px 16px 60px;
        }

        /* ── PAGE TITLE ── */
        .page-title {
            text-align: center;
            margin-bottom: 28px;
        }
        .page-title h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: .5px;
        }
        .page-title p {
            color: var(--ink-soft);
            font-size: .875rem;
            margin-top: 4px;
        }
        .title-rule {
            width: 60px; height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--gold-lt));
            margin: 10px auto 0;
            border-radius: 2px;
        }

        /* ── CONTROLS ── */
        .controls {
            background: white;
            border: 1px solid #e8e2d6;
            border-radius: var(--radius);
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
        }
        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ctrl-group label {
            font-size: .8rem;
            font-weight: 600;
            color: var(--ink-soft);
            text-transform: uppercase;
            letter-spacing: .6px;
            white-space: nowrap;
        }
        select, input[type="number"] {
            padding: 8px 12px;
            font-size: .9rem;
            font-family: 'Be Vietnam Pro', sans-serif;
            font-weight: 500;
            border: 1.5px solid #ddd6c8;
            border-radius: 8px;
            background: var(--paper);
            color: var(--ink);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        select:focus, input[type="number"]:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,.15);
        }
        select#month { min-width: 120px; }
        input#year   { width: 90px; }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 22px;
            background: var(--ink);
            color: var(--gold-lt);
            border: none;
            border-radius: 8px;
            font-family: 'Be Vietnam Pro', sans-serif;
            font-size: .875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s, transform .15s;
        }
        .btn-primary:hover { background: #2c2c4e; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 20px;
            background: white;
            color: var(--ink);
            border: 1.5px solid #ddd6c8;
            border-radius: 8px;
            font-family: 'Be Vietnam Pro', sans-serif;
            font-size: .875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
            text-decoration: none;
        }
        .btn-secondary:hover { border-color: var(--gold); color: var(--gold); background: var(--today-bg); }

        .btn-red {
            background: var(--red);
            color: white;
            border-color: var(--red);
        }
        .btn-red:hover { background: #9b2222; color: white; border-color: #9b2222; }

        /* ── CALENDAR CARD ── */
        .calendar-card {
            background: white;
            border: 1px solid #e8e2d6;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .calendar-month-header {
            background: var(--ink);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .calendar-month-header h3 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.1rem;
            font-weight: 600;
        }
        .calendar-month-header span {
            font-size: .8rem;
            color: rgba(255,255,255,.55);
            font-weight: 400;
        }

        /* ── TABLE ── */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            padding: 10px 4px;
            font-size: .72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .8px;
            color: var(--ink-soft);
            background: var(--paper-alt);
            border-bottom: 1px solid #e0d8cc;
        }
        thead th:first-child { color: var(--sunday); }
        thead th:last-child  { color: var(--saturday); }

        tbody td {
            padding: 0;
            border: 1px solid #f0ebe0;
            vertical-align: top;
            cursor: pointer;
            transition: background .15s;
            min-height: 64px;
        }
        tbody td:empty { cursor: default; background: var(--paper-alt); }
        tbody td:not(:empty):hover { background: #fffbf0; }

        .day-cell-inner {
            padding: 8px 6px 6px;
            min-height: 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .day-solar {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1;
            color: var(--ink);
        }
        .day-lunar {
            font-size: .7rem;
            font-weight: 500;
            color: var(--ink-soft);
            line-height: 1;
        }
        .day-tietKhi {
            font-size: .62rem;
            font-weight: 600;
            color: var(--teal);
            background: var(--teal-lt);
            border-radius: 3px;
            padding: 1px 4px;
            line-height: 1.4;
            margin-top: 1px;
            text-align: center;
        }

        /* Day type styles */
        tbody td.sunday .day-solar { color: var(--sunday); }
        tbody td.saturday .day-solar { color: var(--saturday); }

        tbody td.today {
            background: var(--today-bg);
            border: 2px solid var(--today-bd);
            border-radius: 2px;
        }
        tbody td.today .day-solar {
            color: var(--gold);
            font-weight: 700;
        }

        /* ── TIẾT KHÍ NOTES ── */
        .tietKhi-section {
            background: var(--teal-lt);
            border-left: 4px solid var(--teal);
            border-radius: 0 var(--radius) var(--radius) 0;
            padding: 14px 18px;
            margin: 0 0 20px;
        }
        .tietKhi-section h4 {
            font-size: .78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .7px;
            color: var(--teal);
            margin-bottom: 10px;
        }
        .tietKhi-list {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tietKhi-list li {
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            border: 1px solid rgba(42,127,127,.2);
            border-radius: 6px;
            padding: 5px 10px;
            font-size: .82rem;
            font-weight: 500;
            color: var(--ink);
        }
        .tietKhi-list li .tk-name {
            color: var(--teal);
            font-weight: 700;
        }
        .tietKhi-list li .tk-time {
            color: var(--ink-soft);
            font-size: .75rem;
        }

        .tietKhi-unavail {
            font-size: .85rem;
            color: var(--ink-soft);
            font-style: italic;
        }

        /* ── INFO PANELS ── */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }
        @media (max-width: 580px) {
            .info-grid { grid-template-columns: 1fr; }
        }

        .info-panel {
            background: white;
            border: 1px solid #e8e2d6;
            border-radius: var(--radius);
            padding: 16px 18px;
            box-shadow: var(--shadow);
        }
        .info-panel-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0ebe0;
        }
        .info-panel-icon {
            width: 28px; height: 28px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .9rem;
            flex-shrink: 0;
        }
        .icon-star { background: #fff3e0; }
        .icon-light { background: #fce4ec; }

        .info-panel h4 {
            font-size: .8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .6px;
            color: var(--ink-soft);
        }

        .info-list {
            list-style: none;
        }
        .info-list li {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 6px 0;
            font-size: .85rem;
            color: var(--ink);
            border-bottom: 1px solid #f5f0e8;
        }
        .info-list li:last-child { border-bottom: none; }
        .info-list li .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 5px;
        }
        .dot-gold { background: var(--gold); }
        .dot-red  { background: var(--red); }

        .thienxa-item {
            background: #fff8f8;
            border: 1px solid #f5c6c6;
            border-radius: 8px;
            padding: 8px 10px;
            margin-bottom: 8px;
            font-size: .85rem;
        }
        .thienxa-item:last-child { margin-bottom: 0; }
        .thienxa-item .tx-date { font-weight: 700; color: var(--red); }
        .thienxa-item .tx-detail { color: var(--ink-soft); font-size: .78rem; margin-top: 2px; }

        .empty-note {
            font-size: .83rem;
            color: var(--ink-soft);
            font-style: italic;
            padding: 4px 0;
        }

        /* ── TOOL BUTTONS ROW ── */
        .tool-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        /* ── MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10,10,30,.55);
            backdrop-filter: blur(4px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }

        .modal-box {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 480px;
            padding: 28px 28px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,.25);
            animation: modalIn .2s ease;
            position: relative;
        }
        @keyframes modalIn {
            from { opacity:0; transform: translateY(16px) scale(.97); }
            to   { opacity:1; transform: translateY(0)   scale(1); }
        }

        .modal-box h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            color: var(--ink);
            margin-bottom: 18px;
            padding-right: 28px;
        }

        .modal-close {
            position: absolute;
            top: 18px; right: 18px;
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--paper-alt);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: var(--ink-soft);
            transition: background .15s;
        }
        .modal-close:hover { background: #eadec8; color: var(--ink); }

        /* Day detail modal */
        .detail-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 8px 16px;
            align-items: baseline;
        }
        .detail-grid .lbl {
            font-size: .78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--ink-soft);
            white-space: nowrap;
        }
        .detail-grid .val {
            font-size: .95rem;
            font-weight: 600;
            color: var(--ink);
        }
        .detail-grid .val.highlight { color: var(--teal); }
        .detail-grid .val.tietKhi-val { color: var(--teal); font-weight: 700; }
        .detail-grid .val.canchi { color: var(--gold); }

        .detail-date-badge {
            background: var(--ink);
            color: var(--gold);
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            line-height: 1;
        }
        .detail-date-badge small {
            display: block;
            font-family: 'Be Vietnam Pro', sans-serif;
            font-size: .75rem;
            font-weight: 400;
            color: rgba(255,255,255,.6);
            margin-top: 4px;
        }

        /* Form helpers */
        .form-section { margin-bottom: 16px; }
        .form-section label {
            display: block;
            font-size: .78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--ink-soft);
            margin-bottom: 6px;
        }
        .form-row {
            display: flex;
            gap: 8px;
        }
        .form-row select  { flex: 2; }
        .form-row input   { flex: 1; }
        .form-row > input[placeholder="Ngày"] { flex: 1; min-width: 60px; }
        .form-row > input[placeholder="Năm"] { flex: 1.2; min-width: 80px; }

        .calc-result {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: .9rem;
            font-weight: 600;
            display: none;
        }
        .calc-result.ok  { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; display: block; }
        .calc-result.err { background: #fce4ec; color: #c62828; border: 1px solid #f8bbd9; display: block; }
        .calc-result .highlight-date { color: var(--gold); font-weight: 800; background: var(--ink); padding: 1px 6px; border-radius: 4px; }

        /* Divider */
        hr.modal-divider { border: none; border-top: 1px solid #f0ebe0; margin: 14px 0; }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            .page-title h1 { font-size: 1.5rem; }
            .day-solar { font-size: 1.05rem !important; }
            .day-lunar { font-size: .62rem !important; }
            table { font-size: .75rem; }
            thead th { font-size: .65rem; padding: 8px 2px; }
            tbody td { min-height: 52px; }
            .day-cell-inner { padding: 5px 3px 4px; min-height: 52px; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2a10 10 0 0 1 0 20A10 10 0 0 1 12 2z" fill="rgba(201,168,76,.15)"/>
            <path d="M12 6v6l4 2"/>
        </svg>
        Lịch Âm Dương
    </div>
    <nav class="nav-home">
        <a href="https://chudich.github.io/IChing.html">
            ← Trang Chủ
        </a>
    </nav>
</header>

<!-- MAIN -->
<main class="main">

    <div class="page-title">
        <h1>Lịch Âm Dương</h1>
        <p>Tra cứu lịch âm — tiết khí — can chi</p>
        <div class="title-rule"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <div class="ctrl-group">
            <label for="month">Tháng</label>
            <select id="month">
                <option value="1">Tháng 1</option><option value="2">Tháng 2</option>
                <option value="3">Tháng 3</option><option value="4">Tháng 4</option>
                <option value="5">Tháng 5</option><option value="6">Tháng 6</option>
                <option value="7">Tháng 7</option><option value="8">Tháng 8</option>
                <option value="9">Tháng 9</option><option value="10">Tháng 10</option>
                <option value="11">Tháng 11</option><option value="12">Tháng 12</option>
            </select>
        </div>
        <div class="ctrl-group">
            <label for="year">Năm</label>
            <input type="number" id="year" min="1900" max="2100" value="2025">
        </div>
        <button class="btn-primary" onclick="generateCalendar()">
            Xem lịch
        </button>
    </div>

    <!-- Calendar output -->
    <div id="calendar"></div>

    <!-- Info panels -->
    <div class="info-grid">
        <div class="info-panel" id="importantDays">
            <div class="info-panel-header">
                <div class="info-panel-icon icon-star">⭐</div>
                <h4>Ngày quan trọng</h4>
            </div>
            <div id="importantDaysList"></div>
        </div>
        <div class="info-panel" id="thienXaDays">
            <div class="info-panel-header">
                <div class="info-panel-icon icon-light">✨</div>
                <h4>Ngày Thiên Xá</h4>
            </div>
            <div id="thienXaDaysList"></div>
        </div>
    </div>

    <!-- Tool buttons -->
    <div class="tool-row">
        <button class="btn-secondary" onclick="openModal('calcDaysModal')">
            📅 Tính số ngày
        </button>
        <button class="btn-secondary" onclick="openModal('findTimeModal')">
            🔍 Tìm thời điểm
        </button>
        <a href="https://chudich.github.io/phithienxa.html" style="text-decoration:none;">
            <button class="btn-secondary btn-red">🌟 Phi Thiên Xá</button>
        </a>
    </div>

</main>

<!-- ═══ MODALS ═══ -->

<!-- Day detail -->
<div id="dayModal" class="modal-overlay" onclick="outsideClose(event,'dayModal')">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal('dayModal')">✕</button>
        <div id="modal-detail-content"></div>
    </div>
</div>

<!-- Calc days -->
<div id="calcDaysModal" class="modal-overlay" onclick="outsideClose(event,'calcDaysModal')">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal('calcDaysModal')">✕</button>
        <h3>📅 Tính số ngày</h3>
        <div class="form-section">
            <label>Chọn mốc thời gian</label>
            <div class="form-row">
                <input type="number" id="startDay" placeholder="Ngày" min="1" max="31">
                <select id="startMonth">
                    <option value="1">Th.1</option><option value="2">Th.2</option><option value="3">Th.3</option>
                    <option value="4">Th.4</option><option value="5">Th.5</option><option value="6">Th.6</option>
                    <option value="7">Th.7</option><option value="8">Th.8</option><option value="9">Th.9</option>
                    <option value="10">Th.10</option><option value="11">Th.11</option><option value="12">Th.12</option>
                </select>
                <input type="number" id="startYear" placeholder="Năm" min="1900" max="2100">
            </div>
        </div>
        <div class="form-section">
            <label>Số ngày (âm để đếm lùi)</label>
            <input type="number" id="numDays" placeholder="Ví dụ: 30 hoặc -7" style="width:100%">
        </div>
        <button class="btn-primary" onclick="calculateDate()" style="width:100%">Tính toán</button>
        <div id="calcResult" class="calc-result"></div>
    </div>
</div>

<!-- Find time -->
<div id="findTimeModal" class="modal-overlay" onclick="outsideClose(event,'findTimeModal')">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal('findTimeModal')">✕</button>
        <h3>🔍 Tìm thời điểm</h3>
        <div class="form-section">
            <label>Mốc thời gian 1</label>
            <div class="form-row">
                <input type="number" id="date1Day" placeholder="Ngày" min="1" max="31">
                <select id="date1Month">
                    <option value="1">Th.1</option><option value="2">Th.2</option><option value="3">Th.3</option>
                    <option value="4">Th.4</option><option value="5">Th.5</option><option value="6">Th.6</option>
                    <option value="7">Th.7</option><option value="8">Th.8</option><option value="9">Th.9</option>
                    <option value="10">Th.10</option><option value="11">Th.11</option><option value="12">Th.12</option>
                </select>
                <input type="number" id="date1Year" placeholder="Năm" min="1900" max="2100">

//  GENERATE CALENDAR
// ═══════════════════════════════════════════════════════
function generateCalendar() {
    const month = parseInt(document.getElementById('month').value);
    const year  = parseInt(document.getElementById('year').value);
    const calDiv = document.getElementById('calendar');

    if (isNaN(year) || year < 1900 || year > 2100) {
        calDiv.innerHTML = '<p style="color:var(--red);padding:16px;font-weight:600;">Vui lòng nhập năm từ 1900 đến 2100.</p>';
        return;
    }

    const daysInMonth = new Date(year, month, 0).getDate();
    const firstDay    = new Date(year, month - 1, 1).getDay(); // 0=CN

    // Month name in Vietnamese
    const monthNames = ['','Tháng Một','Tháng Hai','Tháng Ba','Tháng Tư','Tháng Năm','Tháng Sáu',
                        'Tháng Bảy','Tháng Tám','Tháng Chín','Tháng Mười','Tháng Mười Một','Tháng Mười Hai'];

    // Build tiết khí notes section
    const tietKhiNotes = buildTietKhiNotes(year, month);

    // Build table
    let tableHTML = `
    <table>
        <thead>
            <tr>
                <th>CN</th><th>T.2</th><th>T.3</th><th>T.4</th><th>T.5</th><th>T.6</th><th>T.7</th>
            </tr>
        </thead>
        <tbody>`;

    let day = 1;
    let started = false;
    let row = '<tr>';
    let cellCount = 0;

    // Empty leading cells
    for (let i = 0; i < firstDay; i++) {
        row += '<td></td>';
        cellCount++;
    }

    while (day <= daysInMonth) {
        row += getDayCell(year, month, day);
        cellCount++;
        day++;

        if (cellCount === 7) {
            tableHTML += row + '</tr>';
            row = '<tr>';
            cellCount = 0;
        }
    }

    // Trailing empty cells
    if (cellCount > 0) {
        while (cellCount < 7) {
            row += '<td></td>';
            cellCount++;
        }
        tableHTML += row + '</tr>';
    }

    tableHTML += '</tbody></table>';

    calDiv.innerHTML = `
        <div class="calendar-card">
            <div class="calendar-month-header">
                <h3>${monthNames[month]} ${year}</h3>
                <span>Lịch Âm Dương</span>
            </div>
            ${tableHTML}
        </div>
        ${tietKhiNotes}
    `;

    displayImportantDays(year, month);
    displayThienXaDays(year, month);
}

function buildTietKhiNotes(year, month) {
    const terms = getSolarTermsForMonth(year, month);

    if (terms.length === 0) {
        return `<div class="tietKhi-section">
            <h4>Tiết Khí Tháng Này</h4>
            <p class="tietKhi-unavail">Chưa có dữ liệu tiết khí cho năm ${year}. Dữ liệu có sẵn: 2023–2026.</p>
        </div>`;
    }

    const pad = n => String(n).padStart(2,'0');
    const listItems = terms.map(t =>
        `<li>
            <span class="tk-name">${t.name}</span>
            <span>—</span>
            <span>${pad(t.day)}/${pad(month)}/${year}</span>
            <span class="tk-time">${t.time} (ICT)</span>
        </li>`
    ).join('');

    return `<div class="tietKhi-section">
        <h4>Tiết Khí Tháng Này</h4>
        <ul class="tietKhi-list">${listItems}</ul>
    </div>`;
}

// ═══════════════════════════════════════════════════════
//  GET DAY CELL
// ═══════════════════════════════════════════════════════
function getDayCell(year, month, day) {
    let lunarDay = 'N/A', canChiDay = 'N/A', canChiMonth = 'N/A', canChiYear = 'N/A';
    let lunarDisp = '?';

    try {
        const sd = new LunarDateLib.SolarDate({ day, month, year });
        const ld = sd.toLunarDate();
        ld.init();
        lunarDisp = ld.day + '/' + ld.month + (ld.leap ? 'ⁿ' : '');
        canChiDay   = ld.getDayName()   || 'N/A';
        canChiMonth = ld.getMonthName() || 'N/A';
        canChiYear  = ld.getYearName()  || 'N/A';
        lunarDay    = ld.day + '/' + ld.month + (ld.leap ? ' nhuận' : '');
    } catch(e) { /* silent */ }

    // FIX: Lấy tiết khí đúng theo ngày dương lịch (không giới hạn năm 2025)
    const tietKhi = getTietKhiForDay(year, month, day) || null;

    const weekday = new Date(year, month - 1, day).getDay();
    const now = new Date();
    const isToday = (day === now.getDate() && month === now.getMonth()+1 && year === now.getFullYear());

    let cls = '';
    if (weekday === 0) cls = 'sunday';
    if (weekday === 6) cls = 'saturday';
    if (isToday)       cls += ' today';

    const tietKhiTag = tietKhi
        ? `<span class="day-tietKhi">${tietKhi}</span>`
        : '';

    // Safe-encode for onclick attribute
    const safeCC  = s => s.replace(/'/g,"&#39;");

    return `<td class="${cls.trim()}" onclick="showDayDetail(${year},${month},${day},'${safeCC(lunarDay)}','${safeCC(canChiDay)}','${safeCC(canChiMonth)}','${safeCC(canChiYear)}')">
        <div class="day-cell-inner">
            <span class="day-solar">${day}</span>
            <span class="day-lunar">${lunarDisp}</span>
            ${tietKhiTag}
        </div>
    </td>`;
}

// ═══════════════════════════════════════════════════════
//  THIÊN XÁ
// ═══════════════════════════════════════════════════════
function getSeason(lunarMonth) {
    if ([1,2,3].includes(lunarMonth))   return 'Xuân';
    if ([4,5,6].includes(lunarMonth))   return 'Hạ';
    if ([7,8,9].includes(lunarMonth))   return 'Thu';
    if ([10,11,12].includes(lunarMonth)) return 'Đông';
    return null;
}

// FIX: Can Chi phải viết đúng tên để match getDayName()
// Quy tắc Thiên Xá: Xuân-Mậu Dần, Hạ-Giáp Ngọ, Thu-Mậu Thân, Đông-Giáp Tý
function isThienXaDay(canChiDay, season) {
    const rules = { Xuân:'Mậu Dần', Hạ:'Giáp Ngọ', Thu:'Mậu Thân', Đông:'Giáp Tý' };
    return canChiDay === rules[season];
}

function findThienXaDays(year, month) {
    const days = [];
    const daysInMonth = new Date(year, month, 0).getDate();
    const pad = n => String(n).padStart(2,'0');

    for (let d = 1; d <= daysInMonth; d++) {
        try {
            const sd = new LunarDateLib.SolarDate({ day:d, month, year });
            const ld = sd.toLunarDate();
            ld.init();
            const season = getSeason(ld.month);
            const cc = ld.getDayName();
            if (season && isThienXaDay(cc, season)) {
                days.push({
                    solar:  `${pad(d)}/${pad(month)}/${year}`,
                    lunar:  `${pad(ld.day)}/${pad(ld.month)}${ld.leap ? ' nhuận' : ''}`,
                    canChi: cc,
                    season
                });
            }
        } catch(e) { /* silent */ }
    }
    return days;
}

function displayThienXaDays(year, month) {
    const el = document.getElementById('thienXaDaysList');
    const txDays = findThienXaDays(year, month);

    if (txDays.length === 0) {
        el.innerHTML = '<p class="empty-note">Không có ngày Thiên Xá trong tháng này.</p>';
        return;
    }
    el.innerHTML = txDays.map(tx => `
        <div class="thienxa-item">
            <div class="tx-date">✨ ${tx.solar} — ${tx.season}</div>
            <div class="tx-detail">Âm: ${tx.lunar} · Can Chi: ${tx.canChi}</div>
        </div>
    `).join('');
}

// ═══════════════════════════════════════════════════════
//  TÍNH SỐ NGÀY
// ═══════════════════════════════════════════════════════
function calculateDate() {
    const day  = parseInt(document.getElementById('startDay').value);
    const mon  = parseInt(document.getElementById('startMonth').value);
    const yr   = parseInt(document.getElementById('startYear').value);
    const n    = parseInt(document.getElementById('numDays').value);
    const res  = document.getElementById('calcResult');

    if ([day,mon,yr,n].some(isNaN)) {
        res.className = 'calc-result err';
        res.innerHTML = 'Vui lòng nhập đầy đủ thông tin hợp lệ.';
        return;
    }
    const start  = new Date(yr, mon-1, day);
    const result = new Date(start.getTime() + n * 86400000);
    const pad    = x => String(x).padStart(2,'0');
    const fmtIn  = `${pad(day)}.${pad(mon)}.${yr}`;
    const fmtOut = `${pad(result.getDate())}.${pad(result.getMonth()+1)}.${result.getFullYear()}`;
    const dir    = n >= 0 ? `đếm tới ${Math.abs(n)} ngày` : `đếm lùi ${Math.abs(n)} ngày`;

    res.className = 'calc-result ok';
    res.innerHTML = `Từ <span class="highlight-date">${fmtIn}</span> ${dir} → <span class="highlight-date">${fmtOut}</span>`;
}

// ═══════════════════════════════════════════════════════
function calculateDaysBetween() {
    const d1 = parseInt(document.getElementById('date1Day').value);
    const m1 = parseInt(document.getElementById('date1Month').value);
    const y1 = parseInt(document.getElementById('date1Year').value);
    const d2 = parseInt(document.getElementById('date2Day').value);
    const m2 = parseInt(document.getElementById('date2Month').value);
    const y2 = parseInt(document.getElementById('date2Year').value);
    const res = document.getElementById('findResult');

    if ([d1,m1,y1,d2,m2,y2].some(isNaN)) {
        res.className = 'calc-result err';
        res.innerHTML = 'Vui lòng nhập đầy đủ thông tin hợp lệ.';
        return;
    }

    const pad     = x => String(x).padStart(2,'0');
    const date1   = new Date(y1, m1-1, d1);
    const date2   = new Date(y2, m2-1, d2);
    const diff    = Math.floor(Math.abs(date2 - date1) / 86400000);
    const fmtD1   = `${pad(d1)}.${pad(m1)}.${y1}`;
    const fmtD2   = `${pad(d2)}.${pad(m2)}.${y2}`;

    res.className = 'calc-result ok';
    res.innerHTML = `Giữa <span class="highlight-date">${fmtD1}</span> và <span class="highlight-date">${fmtD2}</span> là <strong>${diff}</strong> ngày.`;
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
(function init() {
    const now = new Date();
    document.getElementById('month').value = now.getMonth() + 1;
    document.getElementById('year').value  = now.getFullYear();
    generateCalendar();
})();
</script>
