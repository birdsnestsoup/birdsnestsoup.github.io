<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch Lý Toàn Thư - Sao Chép Quẻ</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8e2e00; --gold: #d4af37; --bg: #f8f5f2; --text: #2d3436; --active: #d63031; --success: #27ae60; }
        body { font-family: 'Lexend', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        .header { text-align: center; margin-bottom: 20px; padding: 10px; border-bottom: 2px solid var(--primary); }
        .header h1 { color: var(--primary); font-size: 1.3rem; margin: 0; text-transform: uppercase; }

        .box { background: #fff; border-radius: 15px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        label { font-size: 0.75rem; font-weight: 600; color: #888; text-transform: uppercase; margin-bottom: 8px; display: block; }
        select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-family: inherit; font-size: 1rem; margin-bottom: 15px; outline: none; background: #fff; }

        .dong-selector { display: flex; justify-content: space-around; margin: 15px 0; padding: 10px; background: #f1f2f6; border-radius: 10px; }
        .dong-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .circle { width: 24px; height: 24px; border: 2px solid #ccc; border-radius: 50%; background: white; transition: 0.3s; margin-bottom: 5px; }
        .dong-item.active .circle { background: var(--active); border-color: var(--active); }
        .dong-item span { font-size: 0.7rem; font-weight: bold; color: #666; }

        .btn-copy { width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 10px; font-family: inherit; font-weight: bold; cursor: pointer; display: none; margin-bottom: 20px; transition: 0.3s; }
        .btn-copy:hover { opacity: 0.9; transform: translateY(-2px); }

        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; display: none; }
        .que-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .que-header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        .que-header.mien-bien { background: #444; }
        .que-name { font-size: 1.1rem; font-weight: bold; margin: 0; }
        .que-cung { font-size: 0.7rem; opacity: 0.9; margin-top: 3px; }

        .hex-container { padding: 20px 10px; display: flex; flex-direction: column-reverse; gap: 10px; }
        .hao-row { display: flex; align-items: center; justify-content: space-between; gap: 5px; height: 25px;}
        .nap-giap { width: 90px; font-size: 0.75rem; color: #444; font-weight: 500; }
        .line-box { flex-grow: 1; height: 10px; min-width: 60px; position: relative;}
        .line-yang { width: 100%; height: 100%; background: var(--primary); border-radius: 2px; }
        .line-yin { width: 100%; height: 100%; display: flex; justify-content: space-between; }
        .line-yin::before, .line-yin::after { content: ""; width: 43%; height: 100%; background: var(--primary); border-radius: 2px; }
        .the-ung { width: 30px; font-size: 0.7rem; font-weight: bold; color: var(--active); text-align: right; }
        
        .is-dong::after { content: "×"; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: white; font-weight: bold; font-size: 14px;}
        .line-yin.is-dong::after { color: var(--active); font-size: 20px;}

        @media (max-width: 500px) { .result-grid { grid-template-columns: 1fr; } }
    </style>
</head>

<div class="container">
    <div class="header"><h1>VẤN QUẺ BIẾN THÔNG</h1></div>

    <div class="box">

        <select id="selectQue" onchange="processDich()">

        </select>

        <label>Chọn Hào Động</label>
        <div class="dong-selector" id="dongSelector">

            <div class="dong-item" onclick="toggleDong(6)"><span>Hào 6</span><div class="circle"></div></div>
        </div>

        <button id="btnCopy" class="btn-copy" onclick="copyToClipboard()">📋 SAO CHÉP KẾT QUẢ</button>
    </div>

    <div id="resultGrid" class="result-grid">
        <div class="que-card">
            <div class="que-header"><p id="resCungChu" class="que-cung"></p><h2 id="resNameChu" class="que-name"></h2></div>
            <div id="hexChu" class="hex-container"></div>
        </div>

            <div id="hexBien" class="hex-container"></div>
        </div>
    </div>
</div>

let currentDong = 0;
let bienQueGiam = null; // Lưu trữ quẻ biến để copy

function updateQueList() {
    const cung = document.getElementById("selectCung").value;
    const queSelect = document.getElementById("selectQue");
    queSelect.innerHTML = '<option value="">-- Chọn quẻ --</option>';
    if (cung && dataDich[cung]) {
        Object.keys(dataDich[cung].quẻ).forEach(qName => {
            let opt = document.createElement("option");
            opt.value = qName; opt.text = qName;
            queSelect.appendChild(opt);
        });
    }
}

function toggleDong(num) {
    currentDong = (currentDong === num) ? 0 : num;
    const items = document.querySelectorAll('.dong-item');
    items.forEach((item, idx) => {
        if (idx + 1 === currentDong) item.classList.add('active');
        else item.classList.remove('active');
    });
    processDich();
}

function findQueByCode(code) {
    for (let cungKey in dataDich) {
        for (let qName in dataDich[cungKey].quẻ) {
            if (dataDich[cungKey].quẻ[qName].c === code) {
                return { name: qName, data: dataDich[cungKey].quẻ[qName], cung: dataDich[cungKey] };
            }
        }
    }
    return null;
}

function processDich() {
    const cungKey = document.getElementById("selectCung").value;
    const qName = document.getElementById("selectQue").value;
    if (!cungKey || !qName) { 
        document.getElementById("resultGrid").style.display = "none"; 
        document.getElementById("btnCopy").style.display = "none";
        return; 
    }

    const chuData = dataDich[cungKey].quẻ[qName];
    renderQue("hexChu", "resNameChu", "resCungChu", qName, chuData, dataDich[cungKey], currentDong);

    if (currentDong > 0) {
        let chuCodeArr = chuData.c.split("");
        let bitIndex = 6 - currentDong;
        chuCodeArr[bitIndex] = chuCodeArr[bitIndex] === "1" ? "0" : "1";
        let bienCode = chuCodeArr.join("");

        bienQueGiam = findQueByCode(bienCode);
        if (bienQueGiam) {
            document.getElementById("cardBien").style.display = "block";
            renderQue("hexBien", "resNameBien", "resCungBien", bienQueGiam.name, bienQueGiam.data, bienQueGiam.cung, 0);
        }
    } else {
        document.getElementById("cardBien").style.display = "none";
        bienQueGiam = null;
    }
    document.getElementById("resultGrid").style.display = "grid";
    document.getElementById("btnCopy").style.display = "block";
}

function renderQue(containerId, nameId, cungId, name, que, cung, dongHao) {
    document.getElementById(nameId).innerText = name;
    document.getElementById(cungId).innerText = `HỌ ${cung.name.toUpperCase()} (${cung.hanh})`;
    const container = document.getElementById(containerId);
    container.innerHTML = "";
    for (let i = 0; i < 6; i++) {
        const row = document.createElement("div");
        row.className = "hao-row";
        const haoThu = i + 1;
        const isYang = que.c[5 - i] === "1";
        const napText = que.n[i];
        let label = ""; let cleanNap = napText;
        if(napText.includes("(Thế)")) { label = "Thế"; cleanNap = napText.replace("(Thế)",""); }
        else if(napText.includes("(Ứng)")) { label = "Ứng"; cleanNap = napText.replace("(Ứng)",""); }
        const dongClass = (haoThu === dongHao) ? "is-dong" : "";
        row.innerHTML = `<div class="nap-giap">${cleanNap}</div><div class="line-box">${isYang ? `<div class="line-yang ${dongClass}"></div>` : `<div class="line-yin ${dongClass}"></div>`}</div><div class="the-ung">${label}</div>`;
        container.appendChild(row);
    }
}

function copyToClipboard() {
    const cungChu = document.getElementById("selectCung").value;
    const nameChu = document.getElementById("selectQue").value;
    const chuData = dataDich[cungChu].quẻ[nameChu];
    
    let text = `Quẻ Chủ : ${nameChu} họ ${dataDich[cungChu].name}\n`;
    for(let i=5; i>=0; i--) {
        let n = chuData.n[i];
        let line = `Hào ${i+1} : ${n}`;
        if(i+1 === currentDong) line += " x Động";
        
        // Định dạng text cho copy
        line = line.replace("(Thế)", " - **Thế**").replace("(Ứng)", " - **Ứng**");
        if(i+1 === currentDong) line = `***${line}***`; // In đậm + nghiêng cả dòng hào động
        text += line + "\n";
    }

    if(bienQueGiam) {
        text += `\n***\nQuẻ Biến : ${bienQueGiam.name} họ ${bienQueGiam.cung.name}\n`;
        for(let i=5; i>=0; i--) {
            let n = bienQueGiam.data.n[i];
            let line = `Hào ${i+1} : ${n}`;
            if(i+1 === currentDong) line += " x Động";
            
            line = line.replace("(Thế)", " - **Thế**").replace("(Ứng)", " - **Ứng**");
            if(i+1 === currentDong) line = `***${line}***`;
            text += line + "\n";
        }
    }

    navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById("btnCopy");
        const oldText = btn.innerText;
        btn.innerText = "✅ ĐÃ SAO CHÉP!";
        btn.style.background = "#2d3436";
        setTimeout(() => { 
            btn.innerText = oldText; 
            btn.style.background = "var(--success)";
        }, 2000);
    });
}
